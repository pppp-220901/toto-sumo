// ---------------- 取組予想タブ ----------------
// その日の「🏁 リザルト」表示用に、取組予想＋東西対抗の的中・ベット数・収支を
// その都度G.bets/G.ewBetsから直接集計する（G.dayLogのキャッシュ値だと、集計ロジックの
// 修正が過去に確定済みの日には反映されない＝東西対抗の的中が抜けて見える問題があった）
function dayResultLive(day) {
  const regular = (G.bets || []).filter(b => b.day === day && b.settled && !b.fusen);
  const ew = (G.ewBets || []).filter(b => b.day === day && b.settled && !b.tie);
  const bets = regular.length + ew.length;
  const hits = regular.filter(b => b.hit).length + ew.filter(b => b.hit).length;
  const net = regular.reduce((s, b) => s + (b.net || 0), 0) + ew.reduce((s, b) => s + (b.net || 0), 0);
  return { bets, hits, net };
}
// 今場所の日別成績一覧（米取表タブ用）。dayResultLiveと同じ理由でG.dayLogではなく
// 生のG.bets/G.ewBetsから毎回集計し直す
function bashoDayResultsLive() {
  const days = new Set();
  (G.bets || []).forEach(b => { if (b.settled && !b.fusen) days.add(b.day); });
  (G.ewBets || []).forEach(b => { if (b.settled && !b.tie) days.add(b.day); });
  return Array.from(days).sort((a, b) => a - b).map(day => Object.assign({ day }, dayResultLive(day)));
}
function renderTorikumi() {
  const info = bashoInfo();
  const el = $("#tab-torikumi");

  if (!info.current) { el.innerHTML = configWarning() + offseasonHTML(info); return; }
  if (G.finishedProcessed) { el.innerHTML = configWarning() + offseasonHTML(info); return; }

  const day = info.current.day, hm = info.now.hm;
  const modeBanner = `
    <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px">
      <span class="muted" style="font-size:12px">${DATA_MODE === "real" ? "🛰 実データ（運営が手動更新）" : "🎲 シミュレーションモード（実データ未取得）"}</span>
      <button class="btn btn-ghost btn-sm" onclick="onNewsRefresh(this)" style="white-space:nowrap">↻ 更新</button>
    </div>`;
  let html = configWarning() + modeBanner + bonusRowHTML();

  // 並び順切替（番付順=結びから / 時系列順=序盤から）
  const sm = UI.sortMode || localStorage.getItem("sortMode") || "banzuke";
  UI.sortMode = sm;
  html += `<div style="display:flex;gap:6px;justify-content:flex-end;align-items:center;margin-bottom:8px">
    <span class="muted" style="font-size:11px">並び順：</span>
    <button class="btn btn-sm ${sm === "banzuke" ? "btn-primary" : "btn-ghost"}" onclick="setSortMode('banzuke')">番付順</button>
    <button class="btn btn-sm ${sm === "time" ? "btn-primary" : "btn-ghost"}" onclick="setSortMode('time')">時系列順</button>
    <button class="btn btn-sm btn-ghost" onclick="openTutorial()" title="遊び方を表示" style="min-width:34px">？</button>
  </div>`;

  // 本日の取組（各取組の直前まで受付・結果は随時反映）— アコーディオン
  const dd = SIM.days[day];
  if (dd) {
    const n = dd.torikumi.length;
    const done = dd.torikumi.filter(bt => bt.result).length;
    const openCount = dd.torikumi.filter((bt, i) => boutState(day, i) === "open").length;

    // 当日のリザルト（全取組終了後に表示。取組予想＋東西対抗をあわせて集計）
    if (n > 0 && done === n) {
      const log = dayResultLive(day);
      if (log && log.bets > 0) {
        html += `
        <div class="day-summary" style="margin-bottom:12px">
          🏁 ${dayKanji(day)} リザルト<br>
          的中 <b style="font-size:22px;color:var(--maroon)">${log.hits}</b><span class="muted"> / ${log.bets} 番</span><br>
          <span class="${log.net >= 0 ? "net-plus" : "net-minus"}">${log.net >= 0 ? "+" : ""}${fmt(log.net)} 合</span><br>
          <button class="btn btn-ghost btn-sm" onclick="onDayResultImage(${day})" style="margin-top:8px">📷 画像で保存</button>
        </div>`;
      } else {
        html += `<div class="day-summary" style="margin-bottom:12px">🏁 ${dayKanji(day)} リザルト<br><span class="muted">本日の張りはありませんでした（見の一日）</span></div>`;
      }
    }
    // デフォルト: 受付中の取組が残っていれば開、全取組終了なら閉
    const openToday = UI.accToday !== undefined ? UI.accToday : openCount > 0;
    let cards = ewCardHTML(day);
    displayOrder(day).forEach(i => { cards += boutCardHTML(dd.torikumi[i], i, day); });
    html += `
    <details class="acc" ${openToday ? "open" : ""} ontoggle="UI.accToday=this.open">
      <summary class="day-banner">💪 ${dayKanji(day)} 取組・結果
        <br><span style="font-size:11px">確定 ${done}/${n}番 ${openCount ? `・受付中 ${openCount}番` : "・全取組終了"}</span>
        <span class="acc-arrow">▼</span>
      </summary>
      <div class="acc-body">${cards}</div>
    </details>`;
  } else {
    html += `<div class="offseason-note">📋 ${dayKanji(day)}の取組は発表待ちです。<br>データが更新されると予想できるようになります。</div>`;
  }

  // 翌日の前売り（18:00以降）— アコーディオン（デフォルト開）
  if (hm >= NEXT_OPEN_HM && day < 15 && !G.finishedProcessed) {
    if (SIM.days[day + 1]) {
      const openTmr = UI.accTomorrow !== undefined ? UI.accTomorrow : true;
      let cards = ewCardHTML(day + 1);
      displayOrder(day + 1).forEach(i => { cards += boutCardHTML(SIM.days[day + 1].torikumi[i], i, day + 1); });
      const nTmr = G.bets.filter(x => x.day === day + 1 && !x.settled).length;
      html += `
      <details class="acc" ${openTmr ? "open" : ""} ontoggle="UI.accTomorrow=this.open">
        <summary class="day-banner">🌅 ${dayKanji(day + 1)} 前売り受付中
          <br><span style="font-size:11px">明日の各取組直前まで変更可能 ${nTmr ? `・${nTmr}件ベット済` : ""}</span>
          <span class="acc-arrow">▼</span>
        </summary>
        <div class="acc-body">${cards}</div>
      </details>`;
    } else {
      html += `<div class="offseason-note">🌅 ${dayKanji(day + 1)}の取組は発表待ちです。<br>発表され次第、前売り予想ができます。</div>`;
    }
  }
  if (day === 15 && dd && dd.torikumi.every(bt => bt.result)) {
    html += `<div class="offseason-note">千秋楽の結果が出揃いました。場所締めの処理をお待ちください。</div>`;
  }
  el.innerHTML = html;
  // 初めて本場所モードに入ったときだけ、遊び方チュートリアルを自動表示
  // （既読は端末単位。他のモーダルが開いているときは邪魔しない）
  if (!localStorage.getItem(TUT_SEEN_KEY) && !tutAutoShown && !$("#modal-area").innerHTML) {
    tutAutoShown = true;
    openTutorial();
  }
}

// 東西対抗カード（オッズ＝結果確定後の勝ち数の差×日程ボーナス・最初の取組前まで受付）
function ewCardHTML(day) {
  const dd = SIM.days[day];
  if (!dd || !dd.torikumi.length) return "";
  const st = ewState(day);
  const c = ewCounts(day);
  const bet = (G.ewBets || []).find(b => b.day === day);
  const open = UI.ewOpen && UI.ewOpen.day === day && st === "open";
  const clickable = st === "open";
  // 日程ボーナスは旧体系のみ（新体系は「勝ち数の差」がそのまま倍率）
  const dayBonus = oddsV2() ? 1 : dayBonusOf(day);
  const margin = Math.abs(c.e - c.w);
  // 開始前は日程ボーナスのみ案内、開始後は「今の差なら何倍か」を都度表示（確定後は最終倍率）
  const oddsLabel = st === "open"
    ? (dayBonus > 1 ? `日程ボーナス×${dayBonus}` : "差がそのまま倍率に")
    : (margin > 0 ? `${st === "done" ? "確定" : "現在"}${round2(margin * dayBonus)}倍` : "同数（現在）");
  // バナー見出し自体に既に「差がそのまま倍率に」を含むため、開催前かつボーナス無しの場合は
  // 重ねて表示しない（bannerTagは見出しに追記する分のみ）
  const bannerTag = st === "open" ? (dayBonus > 1 ? `　日程ボーナス×${dayBonus}` : "") : `　${oddsLabel}`;

  const fBtn = (key, jp) => {
    const picked = bet && !bet.settled && bet.side === key;
    const myCount = key === "east" ? c.e : c.w;
    const winner = st === "done" && c.e !== c.w && ((key === "east") === (c.e > c.w));
    const loser = st === "done" && c.e !== c.w && !winner;
    return `
    <button class="fighter ${picked ? "picked-" + key : ""}" ${clickable ? `onclick="UI.ewOpen={day:${day},side:'${key}'};renderTorikumi()"` : `style="cursor:default;${loser ? "opacity:.55" : ""}"`}>
      <span class="f-side ${key}">${key === "east" ? "東" : "西"}</span>
      <div class="f-name">${winner ? "🏅 " : ""}${jp}</div>
      <div class="f-rank">幕内全${c.total}番の白星数</div>
      <div class="f-record">${st === "open" ? "&nbsp;" : myCount + "勝"}</div>
    </button>`;
  };

  let html = `<div class="bout-card" style="border:2px solid var(--west)">
    <div class="kensho-banner" style="background:var(--west)">⚖ 東西対抗 — 東西の星の差が、そのまま倍率に！${bannerTag}</div>
    <div class="bout-main">${fBtn("east", "東方")}<div class="vs">対</div>${fBtn("west", "西方")}</div>`;

  // 状態行（取組カードと同じ体裁）
  if (st === "done") {
    const winner = c.e === c.w ? "引き分け" : (c.e > c.w ? "東方の勝ち" : "西方の勝ち");
    html += `<div class="bet-status" style="justify-content:center;text-align:center"><span>🥁 <b style="color:var(--east)">東 ${c.e}</b> － <b style="color:var(--west)">${c.w} 西</b>　<b>${winner}</b></span></div>`;
    if (bet && bet.settled) {
      html += bet.tie
        ? `<div class="bet-status" style="justify-content:center"><span>△ ${bet.side === "east" ? "東方" : "西方"}に${fmt(bet.amount)}合 → 引き分け・返還 ±0</span></div>`
        : `<div class="bet-status" style="justify-content:center;background:${bet.hit ? "#eef7ec" : "#fbeeec"}"><span class="${bet.hit ? "hit" : "miss"}">${bet.hit ? "○" : "●"} ${bet.side === "east" ? "東方" : "西方"}に${fmt(bet.amount)}合（${(bet.odds || 3).toFixed(2)}倍） ${bet.net >= 0 ? "+" : ""}${fmt(bet.net)}合</span></div>`;
    }
  } else if (st === "locked") {
    html += `<div class="bet-status" style="justify-content:center;text-align:center"><span class="muted">🔒 締切　途中経過: 東 ${c.e} － ${c.w} 西（${c.done}/${c.total}番）</span></div>`;
  } else {
    html += `<div class="bet-status" style="justify-content:center;text-align:center"><span class="muted">⏳ 締切 ${fmtHM(boutLockHM(0, c.total, day))}頃（最初の取組前まで）</span></div>`;
  }

  // 賭け済み表示（オッズは結果確定まで未定のため、現時点の目安を表示）
  if (bet && !bet.settled) {
    html += `<div class="bet-status"><span><b>${bet.side === "east" ? "東方" : "西方"}</b> に ${fmt(bet.amount)}合（${oddsLabel}）</span>
      ${st === "open" ? `<button class="btn btn-ghost btn-sm" onclick="cancelEwBet(${day});renderHeader();renderTorikumi()">取消</button>` : ""}</div>`;
  }

  // ベットパネル（取組カードと同じ体裁）
  if (open) {
    const sel = UI.ewOpen.side;
    html += `
    <div class="bet-panel">
      <div class="bet-row"><b>${sel === "east" ? "東方" : "西方"}</b>に賭ける（配当は勝ち数の差がそのまま倍率${dayBonus > 1 ? `×日程ボーナス${dayBonus}` : ""}。大差で勝つほど高配当）</div>
      <div class="bet-row"><label>賭け米</label><input type="number" id="ew-amount-${day}" value="500" step="100" min="100" max="${G.points}"> 合</div>
      <div class="bet-row">
        <button class="btn btn-primary" onclick="onEwConfirm(${day})">この予想で確定</button>
        <button class="btn btn-ghost" onclick="UI.ewOpen=null;renderTorikumi()">やめる</button>
      </div>
    </div>`;
  }
  return html + `</div>`;
}
function onEwConfirm(day) {
  const sel = UI.ewOpen && UI.ewOpen.day === day ? UI.ewOpen.side : null;
  if (!sel) return;
  const amount = parseInt(($("#ew-amount-" + day) || {}).value || "0", 10);
  const res = placeEwBet(day, sel, amount);
  if (!res.ok) { alert(res.msg); return; }
  UI.ewOpen = null;
  renderHeader(); renderTorikumi(); drainToasts();
}

// 表示順: 番付順=結びの一番が先頭 / 時系列順=序盤の取組が先頭
function displayOrder(day) {
  const order = boutOrder(day);
  return UI.sortMode === "time" ? order : order.slice().reverse();
}
function setSortMode(m) {
  UI.sortMode = m;
  localStorage.setItem("sortMode", m);
  renderTorikumi();
}

function fighterHTML(bout, i, side, day, state) {
  const id = side === "east" ? bout.east : bout.west;
  const r = rk(id);
  const st = SIM.rikishi[id];
  const odds = finalOdds(bout, side, day);
  const bet = G.bets.find(x => x.day === day && x.bout === i && !x.settled);
  const picked = bet && bet.side === side;
  const winner = bout.result && bout.result.winner === id;
  const loser = bout.result && bout.result.winner !== id;
  let tags = "";
  const fan = fanMult(), kachi = kachiMult(); // 新旧体系で倍率が変わる
  if (side === "east" ? bout.kachiE : bout.kachiW) tags += `<span class="f-tag" style="background:#e8f5e9;color:#2e7d32;border:1px solid #9ccc9c">☆勝ち越し王手×${kachi}</span> `;
  if (side === "east" ? bout.hatsuE : bout.hatsuW) tags += `<span class="f-tag" style="background:#fff3e0;color:#b45309;border:1px solid #f2c894">🌅初白星×${hatsuMult()}</span> `;
  if (st.injured) tags += `<span class="f-tag tag-injured">🩹休場明け×2</span> `;
  if (r.ichimon === G.profile.ichimon) tags += `<span class="f-tag tag-ichimon">一門×${fan}</span> `;
  if (id === G.profile.oshiId) tags += `<span class="f-tag tag-oshi">⭐推し×${fan}</span>`;
  const clickable = state === "open";
  return `
    <button class="fighter ${picked ? "picked-" + side : ""}" ${clickable ? `onclick="openBetPanel(${i},'${side}',${day})"` : 'style="cursor:default;' + (loser ? "opacity:.55" : "") + '"'}>
      <span class="f-side ${side}">${side === "east" ? "東" : "西"}</span>
      <div class="f-name">${winner ? "🏅 " : ""}${esc(r.name)}</div>
      <div class="f-rank">${rankLabel(r.rank)}</div>
      <div class="f-record">${st.wins}勝${st.losses}敗</div>
      <div class="f-odds">${odds.toFixed(2)}倍</div>
      <div>${tags}</div>
    </button>`;
}

function boutCardHTML(bout, i, day) {
  const state = boutState(day, i);
  const n = SIM.days[day].torikumi.length;
  const bet = G.bets.find(x => x.day === day && x.bout === i && !x.settled);
  const open = UI.openBet && UI.openBet.bout === i && UI.openBet.day === day && state === "open";
  let html = `<div class="bout-card ${bout.kensho ? "kensho" : ""}">`;
  if (bout.dayBonus === 2) html += `<div class="kensho-banner" style="background:var(--gold);color:var(--maroon-d)">🎯 ${day === 1 ? "初日ボーナス" : "2週目ボーナス"} — 全取組オッズ×2</div>`;
  if (bout.dayBonus === 3) html += `<div class="kensho-banner" style="background:#421111">🔥 終盤戦・鉄火場 — 全取組オッズ×3！</div>`;
  if (bout.kensho) html += `<div class="kensho-banner">🚩 懸賞一番 — オッズ×${kenshoMult()}！</div>`;
  html += `<div class="bout-main">${fighterHTML(bout, i, "east", day, state)}<div class="vs">対</div>${fighterHTML(bout, i, "west", day, state)}</div>`;
  // 状態行
  if (state === "done") {
    const w = rk(bout.result.winner);
    html += `<div class="bet-status" style="justify-content:center;text-align:center"><span>🥁 <b>${esc(w.name)}</b> の勝ち（${esc(bout.result.kimarite)}）</span></div>`;
    // 自分の賭けの収支
    const sb = G.bets.find(x => x.day === day && x.bout === i && x.settled);
    if (sb) {
      const pickName = rk(sb.side === "east" ? bout.east : bout.west).name;
      let line;
      if (sb.refundAmount !== undefined) {
        line = `<span>△ ${esc(pickName)}に${fmt(sb.amount)}合 → ${sb.fusen ? "不戦勝・返還" : "不成立・返還"}</span><span>±0</span>`;
      } else {
        const cls = sb.net >= 0 ? "hit" : "miss";
        const kNote = sb.kimarite ? `／決まり手「${esc(sb.kimarite)}」${sb.kHit ? "◎" : "✕"}` : "";
        line = `<span>${sb.hit ? "○" : "●"} ${esc(pickName)}に${fmt(sb.amount)}合（${sb.odds.toFixed(2)}倍）${kNote}</span>
          <span class="${cls}">${sb.net >= 0 ? "+" : ""}${fmt(sb.net)}合</span>`;
      }
      html += `<div class="bet-status" style="background:${sb.hit ? "#eef7ec" : "#fbeeec"}">${line}</div>`;
    }
  } else if (state === "locked") {
    html += `<div class="bet-status" style="justify-content:center;text-align:center"><span class="muted">🔒 締切（取組中・結果待ち）</span></div>`;
  } else {
    html += `<div class="bet-status" style="justify-content:center;text-align:center"><span class="muted">⏳ 締切 ${fmtHM(boutLockHM(boutSlot(day, i), n, day))}頃${day === 15 ? "（千秋楽は前倒し進行）" : ""}</span></div>`;
  }
  if (bet) {
    const r = rk(bet.side === "east" ? bout.east : bout.west);
    html += `<div class="bet-status"><span><b>${esc(r.name)}</b> に ${fmt(bet.amount)}合（${bet.odds.toFixed(2)}倍）${bet.kimarite ? `／決まり手「${bet.kimarite}」${fmt(bet.kAmount)}合` : ""}</span>
      ${state === "open" ? `<button class="btn btn-ghost btn-sm" onclick="onCancelBet(${day},${i})">取消</button>` : ""}</div>`;
  }
  if (open) {
    const side = UI.openBet.side;
    const r = rk(side === "east" ? bout.east : bout.west);
    const odds = finalOdds(bout, side, day);
    html += `
    <div class="bet-panel">
      <div class="bet-row"><b>${esc(r.name)}</b>（${odds.toFixed(2)}倍）に賭ける</div>
      <div class="bet-row"><label>賭け米</label><input type="number" id="bet-amount" value="500" step="100" min="100" max="${G.points}"> 合</div>
      <div class="bet-row"><label>決まり手</label>
        <select id="bet-kimarite"><option value="">予想しない</option>
          ${KIMARITE_BET.map(k => `<option value="${k.key}">${k.key}（${round2(k.odds * (bout.kensho ? kenshoMult() : 1))}倍）</option>`).join("")}
        </select>
        <input type="number" id="bet-kamount" value="0" step="100" min="0" placeholder="決まり手賭け米"> 合
      </div>
      <div class="bet-row">
        <button class="btn btn-primary" onclick="onConfirmBet(${day},${i},'${side}')">この予想で確定</button>
        <button class="btn btn-ghost" onclick="UI.openBet=null;renderTorikumi()">やめる</button>
      </div>
    </div>`;
  }
  return html + `</div>`;
}

function openBetPanel(i, side, day) {
  if (boutState(day, i) !== "open") { showToast("🔒 締切", "この取組の受付は終了しています"); return; }
  UI.openBet = { bout: i, side, day };
  renderTorikumi();
  const r = rk(side === "east" ? SIM.days[day].torikumi[i].east : SIM.days[day].torikumi[i].west);
  if (r.ichimon === G.profile.ichimon) oyakataSay("ichimon");
  else if (r.id === G.profile.oshiId) oyakataSay("oshi");
}
function onConfirmBet(day, i, side) {
  const amount = parseInt($("#bet-amount").value || "0", 10);
  const kimarite = $("#bet-kimarite").value || null;
  const kAmount = parseInt($("#bet-kamount").value || "0", 10);
  const res = placeBet(day, i, side, amount, kimarite, kimarite ? kAmount : 0);
  if (!res.ok) { alert(res.msg); return; }
  UI.openBet = null;
  renderHeader(); renderTorikumi(); drainToasts();
}
function onCancelBet(day, i) { cancelBet(day, i); renderHeader(); renderTorikumi(); }

function onChanko() {
  if (takeChanko()) {
    showToast("🍲 ちゃんこボーナス", "+1,000合 ごっつぁんです！");
    renderHeader(); renderTorikumi(); drainToasts();
  }
}

function showSettleModal(summaries) {
  let html = `<h2 class="banner">🥁 結果精算</h2>`;
  summaries.forEach(sm => {
    html += `<p style="font-weight:bold;color:var(--maroon);margin-top:8px">${dayKanji(sm.day)}（${sm.betCount}ベット ${sm.dayHits}的中）</p>`;
    sm.details.forEach(d => {
      if (d.ewBet) {
        const b = d.ewBet, c = d.counts;
        html += `<div class="result-line"><span>⚖ 東西対抗（東${c.e}－${c.w}西） ${b.side === "east" ? "東方" : "西方"}に${fmt(b.amount)}合</span>
          <span class="${b.tie ? "" : b.hit ? "hit" : "miss"}">${b.tie ? "引き分け・返還" : (b.net >= 0 ? "+" : "") + fmt(b.net)}</span></div>`;
        return;
      }
      if (d.refund !== undefined) {
        const pickName = rk(d.bet.side === "east" ? d.bout.east : d.bout.west).name;
        const label = d.fusen ? "不戦勝・返還" : "取組不成立";
        html += `<div class="result-line"><span>△ <b>${esc(pickName)}</b> — ${label}</span><span>返還 +${fmt(d.refund)}</span></div>`;
        return;
      }
      const w = rk(d.bout.result.winner);
      const pickName = rk(d.bet.side === "east" ? d.bout.east : d.bout.west).name;
      html += `<div class="result-line">
        <span>${d.hit ? "○" : "●"} <b>${esc(pickName)}</b> ${fmt(d.bet.amount)}合 <span class="km">→ ${esc(w.name)}（${esc(d.bout.result.kimarite)}）</span></span>
        <span class="${d.hit ? "hit" : "miss"}">${d.hit ? "+" + fmt(d.gain + d.oshiBonus) : "-" + fmt(d.bet.amount)}</span></div>`;
      if (d.bet.kimarite) html += `<div class="result-line"><span style="padding-left:18px" class="km">決まり手「${esc(d.bet.kimarite)}」</span><span class="${d.kHit ? "hit" : "miss"}">${d.kHit ? "+" + fmt(d.kGain) : "-" + fmt(d.bet.kAmount)}</span></div>`;
      if (d.oshiBonus) html += `<div class="result-line"><span style="padding-left:18px" class="km">⭐推し力士ボーナス</span><span class="hit">+${fmt(d.oshiBonus)}</span></div>`;
    });
    html += `<div class="day-summary"><span class="${sm.net >= 0 ? "net-plus" : "net-minus"}">${sm.net >= 0 ? "+" : ""}${fmt(sm.net)} 合</span></div>`;
  });
  html += `<button class="btn btn-primary btn-wide" style="margin-top:12px" onclick="closeModal();playPendingModals();renderAll()">閉じる</button>`;
  openModal(html);
  const totalNet = summaries.reduce((a, sm) => a + sm.net, 0);
  oyakataSay(totalNet >= 0 ? "win" : "lose");
}

// 的中率の円グラフ（ドーナツ）。指定canvasに 的中/不的中 を描く
function drawBashoHitChart(id, hits, bets) {
  const cv = document.getElementById(id);
  if (!cv || !cv.getContext) return;
  const ctx = cv.getContext("2d");
  if (!ctx) return;
  const cx = 70, cy = 70, R = 60, r = 38;
  ctx.clearRect(0, 0, 140, 140);
  const arc = (from, to, color) => {
    ctx.beginPath(); ctx.arc(cx, cy, R, from, to); ctx.arc(cx, cy, r, to, from, true);
    ctx.closePath(); ctx.fillStyle = color; ctx.fill();
  };
  const total = bets || 0;
  if (total === 0) { arc(0, Math.PI * 2, "#e3dac0"); }
  else {
    const hitEnd = -Math.PI / 2 + Math.PI * 2 * (hits / total);
    arc(-Math.PI / 2, hitEnd, "#6b1e28");          // 的中（えんじ）
    arc(hitEnd, -Math.PI / 2 + Math.PI * 2, "#e3dac0"); // 不的中
  }
  const rate = total ? Math.round(hits / total * 100) : 0;
  ctx.fillStyle = "#6b1e28"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.font = "bold 22px serif"; ctx.fillText(rate + "%", cx, cy - 4);
  ctx.font = "10px sans-serif"; ctx.fillStyle = "#8a7a60"; ctx.fillText("的中率", cx, cy + 16);
}

// ---------------- 番付予想タブ（オフシーズン） ----------------
// 来場所の大相撲の新番付・上位16人（横綱〜前頭上位）の完全一致を狙う。
// 三役（横綱〜小結）は人数を1〜4人で増減でき、常に合計16人になるよう
// 前頭側の対象範囲（何枚目まで含むか）が自動的に伸縮する。
const YOSOU_TOTAL = 16;
const YOSOU_SANYAKU = [
  { key: "yokozuna", rk: "Y", label: "横綱", min: 1, max: 4 },
  { key: "ozeki",    rk: "O", label: "大関", min: 1, max: 4 },
  { key: "sekiwake", rk: "S", label: "関脇", min: 2, max: 4 },
  { key: "komusubi", rk: "K", label: "小結", min: 2, max: 4 },
];
function bashoStartMsOf(key) {
  const [y, m] = key.split("-").map(Number);
  return Date.UTC(y, m - 1, secondSunday(y, m));
}
// 予想候補: 前場所の幕内力士全員（上位16人は幕内からしか生まれない）
function yosouCandidates() {
  return RIKISHI.filter(r => /^([YOSK]|M\d+)$/.test(r.rank)).map(r => r.name);
}
// 三役スロットのラベル: 1人→側なし / 2人→東・西 / 3人→東・西・② / 4人→東・西・東②・西②
function yosouSlotLabel(tier, count, idx) {
  if (count <= 1) return tier.label;
  if (idx === 0) return "東" + tier.label;
  if (idx === 1) return "西" + tier.label;
  if (idx === 2) return count === 3 ? tier.label + "②" : "東" + tier.label + "②";
  return "西" + tier.label + "②";
}
function maegashiraLabelOf(n) { return n === 1 ? "前頭筆頭" : `前頭${n}枚目`; }
// 現在の三役人数から、全16スロットを {key,label} の配列で返す
function yosouAllSlots(counts) {
  const list = [];
  YOSOU_SANYAKU.forEach(t => {
    const c = counts[t.key] || 2;
    for (let i = 0; i < c; i++) list.push({ key: `${t.key}-slot${i}`, label: yosouSlotLabel(t, c, i) });
  });
  let n = 1;
  while (list.length < YOSOU_TOTAL && n <= 8) {
    for (const side of ["東", "西"]) {
      if (list.length >= YOSOU_TOTAL) break;
      list.push({ key: `maegashira${n}-${side}`, label: side + maegashiraLabelOf(n) });
    }
    n++;
  }
  return list.slice(0, YOSOU_TOTAL);
}
// 三役人数の初期値: 前場所の実際の在位人数（データがなければ2人ずつ）
function yosouDefaultCounts() {
  const c = {};
  YOSOU_SANYAKU.forEach(t => {
    const n = RIKISHI.filter(r => r.rank === t.rk).length;
    c[t.key] = Math.max(t.min, Math.min(t.max, n || 2));
  });
  return c;
}
// 受付期間に入っていれば、来場所向けの予想の入れ物を用意する
function ensureYosouState(sched) {
  if (!sched.yosouOpen || !sched.next) return;
  if (!G.banzukePrediction || G.banzukePrediction.forBashoKey !== sched.next.key) {
    G.banzukePrediction = {
      forBashoKey: sched.next.key,
      counts: yosouDefaultCounts(),
      slots: {},
      confirmed: false, graded: false, result: null, detail: null
    };
    save();
  }
}
// 答え合わせ用の正解データ（スクレイパーが番付発表後に取得）
// 優先: nextBanzuke（オフシーズン中に配布） / 代替: 予想対象の場所が始まった後はその場所のbanzuke
function yosouAnswerList() {
  const p = G.banzukePrediction;
  if (!p || !REAL) return null;
  if (REAL.nextBanzuke && REAL.nextBanzuke.bashoKey === p.forBashoKey && Array.isArray(REAL.nextBanzuke.list) && REAL.nextBanzuke.list.length) {
    return REAL.nextBanzuke.list;
  }
  if (REAL.bashoKey === p.forBashoKey && Array.isArray(REAL.banzuke) && REAL.banzuke.length) {
    return REAL.banzuke;
  }
  return null;
}
// 正解リストを予想と同じスロット割りに変換
function yosouAnswerSlots(list) {
  const isEast = s => s === "東" || s === "E";
  const slots = {};
  let total = 0;
  YOSOU_SANYAKU.forEach(t => {
    const members = list.filter(x => x.rank === t.rk);
    const e = members.filter(x => isEast(x.side)), w = members.filter(x => !isEast(x.side));
    const ordered = [];
    for (let i = 0; i < Math.max(e.length, w.length); i++) {
      if (e[i]) ordered.push(e[i]);
      if (w[i]) ordered.push(w[i]);
    }
    ordered.slice(0, 4).forEach((x, i) => {
      if (total < YOSOU_TOTAL) { slots[`${t.key}-slot${i}`] = x.name; total++; }
    });
  });
  let n = 1;
  while (total < YOSOU_TOTAL && n <= 8) {
    for (const side of ["東", "西"]) {
      if (total >= YOSOU_TOTAL) break;
      const x = list.find(v => v.rank === "M" + n && (isEast(v.side) ? side === "東" : side === "西"));
      if (x) slots[`maegashira${n}-${side}`] = x.name;
      total++;
    }
    n++;
  }
  return slots;
}
// 締切後に正解データが届いていれば採点し、ボーナスを持ち米に加算する
function maybeGradeYosou() {
  const p = G.banzukePrediction;
  if (!p || p.graded || !p.forBashoKey) return false;
  const deadline = bashoStartMsOf(p.forBashoKey) - 13 * 86400e3; // 番付発表の月曜0:00
  if (jstNow().dateMs < deadline) return false;
  if (!p.confirmed) { p.graded = true; p.result = null; save(); return false; } // 未確定は不参加扱い
  const list = yosouAnswerList();
  if (!list) return false; // 番付発表データ待ち（次回起動時に再チェック）
  const answer = yosouAnswerSlots(list);
  const slots = yosouAllSlots(p.counts);
  let correct = 0;
  const detail = slots.map(({ key, label }) => {
    const guess = p.slots[key] || null;
    const ans = answer[key] || null;
    const hit = !!guess && guess === ans;
    if (hit) correct++;
    return { label, guess, answer: ans, hit };
  });
  const miss = YOSOU_TOTAL - correct;
  const bonus = yosouBonusOf(miss);
  p.graded = true;
  p.result = { correct, total: YOSOU_TOTAL, miss, bonus };
  p.detail = detail;
  G.points += bonus;
  pendingModals.push({ type: "yosou", data: p.result });
  save();
  return true;
}
function showYosouResultModal(r) {

}

// 予想入力フォーム（受付期間中）
function yosouFormHTML(sched) {
  const p = G.banzukePrediction;
  if (!p) return "";
  const cands = yosouCandidates();
  const locked = !!p.confirmed;
  // 同じ力士は2枠以上に置けない: 他の枠で選択済みの力士はグレーアウトする
  const used = new Set(Object.values(p.slots).filter(Boolean));
  const opt = sel => `<option value="">－ 未選択 －</option>` + cands.map(n => {
    const taken = used.has(n) && n !== sel;
    return `<option value="${esc(n)}" ${sel === n ? "selected" : ""} ${taken ? "disabled" : ""}>${esc(n)}${taken ? "（選択済み）" : ""}</option>`;
  }).join("");
  let rows = "";
  let no = 1;
  YOSOU_SANYAKU.forEach(t => {
    const c = p.counts[t.key] || 2;
    for (let i = 0; i < c; i++) {
      const key = `${t.key}-slot${i}`;
      rows += `
        <tr${i === 0 ? ' style="border-top:2px solid var(--gold)"' : ""}>
          <td style="text-align:center;color:#9a8b74;font-size:12px">${no++}</td>
          <td style="white-space:nowrap"><b>${yosouSlotLabel(t, c, i)}</b></td>
          <td><select ${locked ? "disabled" : ""} onchange="onYosouSelect('${key}', this.value)" style="width:100%">${opt(p.slots[key])}</select></td>
        </tr>`;
    }
    if (!locked) {
      rows += `
        <tr><td colspan="3" style="text-align:right;padding:4px 6px 8px">
          ${c < t.max ? `<button class="btn btn-ghost btn-sm" onclick="onYosouCount('${t.key}', 1)">＋ ${t.label}を1人増やす</button>` : ""}
          ${c > t.min ? `<button class="btn btn-ghost btn-sm" onclick="onYosouCount('${t.key}', -1)">－ ${t.label}を1人減らす</button>` : ""}
        </td></tr>`;
    }
  });
  const sanyakuSum = YOSOU_SANYAKU.reduce((s, t) => s + (p.counts[t.key] || 2), 0);
  const mSlots = yosouAllSlots(p.counts).filter(s => s.key.startsWith("maegashira"));
  mSlots.forEach((s, i) => {
    rows += `
      <tr${i === 0 ? ' style="border-top:2px solid var(--gold)"' : ""}>
        <td style="text-align:center;color:#9a8b74;font-size:12px">${no++}</td>
        <td style="white-space:nowrap"><b>${esc(s.label)}</b></td>
        <td><select ${locked ? "disabled" : ""} onchange="onYosouSelect('${s.key}', this.value)" style="width:100%">${opt(p.slots[s.key])}</select></td>
      </tr>`;
  });
  const filled = yosouAllSlots(p.counts).filter(s => p.slots[s.key]).length;
  const lastLabel = mSlots.length ? mSlots[mSlots.length - 1].label.slice(1) : "";
  return `
    <div class="card">
      <div class="note">三役${sanyakuSum}人＋前頭＝合計16人。三役の人数を増減すると、前頭は「${esc(lastLabel)}」まで自動で伸縮します。
      横綱・大関が1人だけの場合は「減らす」で調整を。<b>締切（${sched.announceMs ? fmtDateJa(sched.announceMs - 86400e3) : ""}）までは確定後も何度でも修正できます。</b></div>
      <table class="banzuke"><tr><th style="width:34px">No.</th><th style="width:110px">番付</th><th>予想する力士</th></tr>${rows}</table>
      ${locked
        ? `<div class="locked-box" style="margin-top:10px"><span class="seal">確定</span> 予想を確定しました（${filled}/16枠 入力済み）。締切までは修正できます。</div>
           <button class="btn btn-ghost btn-wide" style="margin-top:8px" onclick="onYosouEdit()">✏ 編集に戻る</button>
           <button class="btn btn-ghost btn-wide" style="margin-top:6px" onclick="onYosouImage()">📷 予想を画像で保存</button>`
        : `<div class="center" style="margin:8px 0 4px"><span class="muted">入力済み ${filled}/16枠</span></div>
           <button class="btn btn-primary btn-wide" onclick="onYosouConfirm()">この内容で確定する</button>`}
    </div>`;
}
function onYosouSelect(key, value) {
  const p = G.banzukePrediction;
  if (!p || p.confirmed) return;
  // 重複ガード（グレーアウトをすり抜けた場合の保険）
  if (value && Object.entries(p.slots).some(([k, v]) => k !== key && v === value)) {
    showToast("⚠ 重複しています", `${value}は別の枠で選択済みです`);
    renderYosou();
    return;
  }
  if (value) p.slots[key] = value; else delete p.slots[key];
  save();
  renderYosou(); // 他のプルダウンのグレーアウト状態を更新
}
function onYosouCount(tierKey, delta) {
  const p = G.banzukePrediction;
  if (!p || p.confirmed) return;
  const t = YOSOU_SANYAKU.find(x => x.key === tierKey);
  const next = (p.counts[tierKey] || 2) + delta;
  if (next < t.min || next > t.max) return;
  p.counts[tierKey] = next;
  // 対象外になったスロットの選択は破棄する
  const validKeys = new Set(yosouAllSlots(p.counts).map(s => s.key));
  Object.keys(p.slots).forEach(k => { if (!validKeys.has(k)) delete p.slots[k]; });
  save();
  renderYosou();
}
function onYosouConfirm() {
  const p = G.banzukePrediction;
  if (!p) return;
  const total = yosouAllSlots(p.counts).length;
  const filled = yosouAllSlots(p.counts).filter(s => p.slots[s.key]).length;
  if (filled < total && !confirm(`まだ${total - filled}枠が未選択です。未選択の枠は不的中扱いになります。このまま確定しますか？`)) return;
  p.confirmed = true;
  save();
  showToast("🏆 番付予想を確定", "締切までは「編集に戻る」で何度でも修正できます");
  renderYosou();
}
function onYosouEdit() {
  const p = G.banzukePrediction;
  if (!p) return;
  const sched = offseasonSchedule();
  if (!sched.yosouOpen) { showToast("⏰ 締切済み", "番付予想の受付は終了しています"); return; }
  p.confirmed = false;
  save();
  renderYosou();
}

// ---------------- 番付予想の画像書き出し ----------------
// 完成した予想を「東｜番付｜西」の番付表風1枚画像にする。
// iPhone SafariではWeb Share APIの共有シート経由で「写真」に保存できる。
// 非対応環境では、モーダル表示（長押し保存）とダウンロードリンクにフォールバック。
function yosouImageRows(p) {
  const rows = [];
  YOSOU_SANYAKU.forEach(t => {
    const c = p.counts[t.key] || 2;
    for (let base = 0; base < c; base += 2) {
      rows.push({
        label: t.label + (base ? "②" : ""),
        e: p.slots[`${t.key}-slot${base}`] || "",
        w: (base + 1 < c) ? (p.slots[`${t.key}-slot${base + 1}`] || "") : null, // null=枠なし
        tierFirst: base === 0
      });
    }
  });
  const byN = {};
  yosouAllSlots(p.counts).forEach(s => {
    const m = s.key.match(/^maegashira(\d+)-(東|西)$/);
    if (m) (byN[m[1]] = byN[m[1]] || {})[m[2]] = p.slots[s.key] || "";
  });
  Object.keys(byN).map(Number).sort((a, b) => a - b).forEach((n, i) => {
    rows.push({
      label: maegashiraLabelOf(n),
      e: byN[n]["東"] !== undefined ? byN[n]["東"] : null,
      w: byN[n]["西"] !== undefined ? byN[n]["西"] : null,
      tierFirst: i === 0
    });
  });
  return rows;
}
function drawYosouImage(p) {
  const rows = yosouImageRows(p);
  const W = 700, rowH = 54, headH = 140, footH = 90;
  const H = headH + rows.length * rowH + footH;
  const cv = document.createElement("canvas");
  const scale = 2; // Retina対応
  cv.width = W * scale; cv.height = H * scale;
  const ctx = cv.getContext("2d");
  if (!ctx) return null;
  ctx.scale(scale, scale);
  const MINCHO = "'Hiragino Mincho ProN','Yu Mincho',serif";
  // 和紙背景
  ctx.fillStyle = "#faf3e6"; ctx.fillRect(0, 0, W, H);
  // ヘッダー帯
  ctx.fillStyle = "#6b1e28"; ctx.fillRect(0, 0, W, 88);
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillStyle = "#e8cf8f";
  ctx.font = `bold 28px ${MINCHO}`;
  ctx.fillText(`${bashoNameFromKey(p.forBashoKey)} 新番付予想`, W / 2, 36);
  ctx.font = `15px ${MINCHO}`;
  ctx.fillText(`予想者：${currentTitleName()} ${G.profile.shikona}`, W / 2, 66);
  // 列見出し（東｜番付｜西）
  const cCol = 170;                      // 中央列の幅
  const eCx = (W - cCol) / 4;            // 東列の中心
  const wCx = W - (W - cCol) / 4;        // 西列の中心
  ctx.fillStyle = "#8a5a20";
  ctx.font = `bold 18px ${MINCHO}`;
  ctx.fillText("東", eCx, headH - 26);
  ctx.fillText("番　付", W / 2, headH - 26);
  ctx.fillText("西", wCx, headH - 26);
  ctx.strokeStyle = "#c9a24b"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(30, headH - 8); ctx.lineTo(W - 30, headH - 8); ctx.stroke();
  // 行
  rows.forEach((r, i) => {
    const y = headH + i * rowH + rowH / 2;
    if (i > 0) {
      ctx.strokeStyle = r.tierFirst ? "#c9a24b" : "#e2d3b4";
      ctx.lineWidth = r.tierFirst ? 2 : 1;
      ctx.beginPath(); ctx.moveTo(30, y - rowH / 2); ctx.lineTo(W - 30, y - rowH / 2); ctx.stroke();
    }
    ctx.fillStyle = "#6b1e28";
    ctx.font = `bold 17px ${MINCHO}`;
    ctx.fillText(r.label, W / 2, y);
    const name = v => v === null ? "" : (v || "―");
    ctx.font = `bold 22px ${MINCHO}`;
    ctx.fillStyle = "#3a2c22";
    if (r.e !== null) ctx.fillText(name(r.e), eCx, y);
    if (r.w !== null) ctx.fillText(name(r.w), wCx, y);
  });
  // フッター
  ctx.strokeStyle = "#c9a24b"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(30, H - footH + 14); ctx.lineTo(W - 30, H - footH + 14); ctx.stroke();
  ctx.fillStyle = "#6b1e28";
  ctx.font = `bold 20px ${MINCHO}`;
  ctx.fillText("#トト相撲", W / 2, H - footH / 2 + 6);
  return cv;
}
function dataUrlToFile(dataUrl, name) {
  const b64 = dataUrl.split(",")[1];
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new File([arr], name, { type: "image/png" });
}
// 画像の共有/保存の共通処理: iPhone Safariは共有シート（→「画像を保存」で写真へ）、
// 非対応環境はモーダル表示（長押し保存）＋ダウンロードリンクにフォールバック
async function shareOrShowImage(cv, filename, shareTitle) {
  // ユーザー操作の流れを保つため同期APIで生成してから共有する（iOSのシェア制限対策）
  const dataUrl = cv.toDataURL("image/png");
  const file = dataUrlToFile(dataUrl, filename);
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: shareTitle });
      return; // 共有シートから「画像を保存」で写真アプリへ
    } catch (e) {
      if (e && e.name === "AbortError") return; // ユーザーキャンセル
      // それ以外の失敗はフォールバックへ
    }
  }
  openModal(`
    <h2 class="banner">📷 画像を保存</h2>
    <div class="note">iPhoneでは画像を<b>長押し</b> →「"写真"に追加」で保存できます。パソコンではダウンロードボタンをどうぞ。</div>
    <img src="${dataUrl}" alt="${esc(shareTitle)}" style="width:100%;border:1px solid #d8cdb4;border-radius:8px;margin:8px 0">
    <a class="btn btn-ghost btn-wide" href="${dataUrl}" download="${filename}" style="text-decoration:none">💾 ダウンロード</a>
    <button class="btn btn-gold btn-wide" style="margin-top:8px" onclick="closeModal()">閉じる</button>
  `);
}
async function onYosouImage() {
  const p = G.banzukePrediction;
  if (!p) return;
  const cv = drawYosouImage(p);
  if (!cv) { showToast("⚠ 画像生成に失敗", "この環境ではCanvasが使えないようです"); return; }
  await shareOrShowImage(cv, `banzuke_yosou_${p.forBashoKey}.png`, "番付予想 #トト相撲");
}

// その日の収支・的中率と、賭けの内容・結果の箇条書きを1枚のPNGにする
function dayResultImageLines(day) {
  const dd = SIM && SIM.days[day];
  const lines = [];
  (G.bets || []).filter(b => b.day === day && b.settled).forEach(b => {
    const bout = dd && dd.torikumi[b.bout];
    const my = bout ? rk(b.side === "east" ? bout.east : bout.west).name : "?";
    const opp = bout ? rk(b.side === "east" ? bout.west : bout.east).name : "?";
    if (b.fusen || b.refundAmount) {
      lines.push({ mark: "―", color: "#8a7a63", text: `${my}（不戦・返還）${fmt(b.amount + (b.kAmount || 0))}合` });
      return;
    }
    let text = `${my}（対 ${opp}）${fmt(b.amount)}合 ×${b.odds}`;
    if (b.kimarite && b.kAmount) text += `／手:${b.kimarite}${b.kHit ? "○" : "●"}`;
    text += ` → ${b.net >= 0 ? "+" : ""}${fmt(b.net)}合`;
    lines.push({ mark: b.hit ? "○" : "●", color: b.hit ? "#2e7d4f" : "#b23b3b", text });
  });
  (G.ewBets || []).filter(b => b.day === day && b.settled).forEach(b => {
    const side = b.side === "east" ? "東方" : "西方";
    if (b.tie) {
      lines.push({ mark: "―", color: "#8a7a63", text: `東西対抗・${side} ${fmt(b.amount)}合（同数・返還）` });
    } else {
      lines.push({
        mark: b.hit ? "○" : "●", color: b.hit ? "#2e7d4f" : "#b23b3b",
        text: `東西対抗・${side} ${fmt(b.amount)}合${b.hit ? ` ×${b.odds}` : ""} → ${b.net >= 0 ? "+" : ""}${fmt(b.net)}合`
      });
    }
  });
  return lines;
}
function drawDayResultImage(day) {
  const lines = dayResultImageLines(day);
  const log = dayResultLive(day);
  const rate = log.bets ? Math.round(log.hits / log.bets * 100) : 0;
  const W = 700, headH = 88, statsH = 96, rowH = 32, footH = 80;
  const H = headH + statsH + lines.length * rowH + footH;
  const cv = document.createElement("canvas");
  const scale = 2;
  cv.width = W * scale; cv.height = H * scale;
  const ctx = cv.getContext("2d");
  if (!ctx) return null;
  ctx.scale(scale, scale);
  const MINCHO = "'Hiragino Mincho ProN','Yu Mincho',serif";
  const [y, m] = G.bashoKey ? G.bashoKey.split("-").map(Number) : [0, 0];
  // 和紙背景・ヘッダー帯
  ctx.fillStyle = "#faf3e6"; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = "#6b1e28"; ctx.fillRect(0, 0, W, headH);
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillStyle = "#e8cf8f";
  ctx.font = `bold 26px ${MINCHO}`;
  ctx.fillText(`${y ? bashoNameOf(y, m) : ""} ${dayKanji(day)} リザルト`, W / 2, 36);
  ctx.font = `15px ${MINCHO}`;
  ctx.fillText(`${currentTitleName()} ${G.profile.shikona}`, W / 2, 66);
  // 成績サマリ（的中率と収支）
  ctx.fillStyle = "#3a2c22";
  ctx.font = `bold 22px ${MINCHO}`;
  ctx.fillText(`的中 ${log.hits}／${log.bets}番（的中率${rate}%）`, W / 2, headH + 32);
  ctx.fillStyle = log.net >= 0 ? "#2e7d4f" : "#b23b3b";
  ctx.font = `bold 26px ${MINCHO}`;
  ctx.fillText(`収支 ${log.net >= 0 ? "+" : ""}${fmt(log.net)}合`, W / 2, headH + 68);
  ctx.strokeStyle = "#c9a24b"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(30, headH + statsH - 6); ctx.lineTo(W - 30, headH + statsH - 6); ctx.stroke();
  // 賭けの箇条書き
  ctx.textAlign = "left";
  lines.forEach((l, i) => {
    const ly = headH + statsH + i * rowH + rowH / 2;
    ctx.font = `bold 17px ${MINCHO}`;
    ctx.fillStyle = l.color;
    ctx.fillText(l.mark, 34, ly);
    ctx.font = `15px ${MINCHO}`;
    ctx.fillStyle = "#3a2c22";
    ctx.fillText(l.text, 58, ly, W - 92); // maxWidthで自動縮小し、はみ出しを防ぐ
  });
  // フッター
  ctx.textAlign = "center";
  ctx.strokeStyle = "#c9a24b";
  ctx.beginPath(); ctx.moveTo(30, H - footH + 12); ctx.lineTo(W - 30, H - footH + 12); ctx.stroke();
  ctx.fillStyle = "#6b1e28";
  ctx.font = `bold 20px ${MINCHO}`;
  ctx.fillText("#トト相撲", W / 2, H - footH / 2 + 4);
  return cv;
}

// 賭け動向の集計と描画: 全プレイヤーのbet_trend（力士名→件数）を合算し、
// 人気トップ10を横棒グラフで表示する
async function fillBetTrend(bashoKey) {
  const el = $("#trend-area");
  if (!el) return;
  const list = await fetchLeaderboard(bashoKey);
  if (!list) { el.innerHTML = `<p class="muted center">取得できませんでした（通信状況をご確認ください）</p>`; return; }
  const agg = {};
  let voters = 0;
  list.forEach(p => {
    if (!p.bet_trend || typeof p.bet_trend !== "object") return;
    const names = Object.keys(p.bet_trend);
    if (!names.length) return;
    voters++;
    names.forEach(n => { agg[n] = (agg[n] || 0) + (Number(p.bet_trend[n]) || 0); });
  });
  const ranked = Object.entries(agg).sort((a, b) => b[1] - a[1]).slice(0, 10);
  if (!ranked.length) {
    el.innerHTML = `<p class="muted center">まだ賭けデータがありません。みんなが賭けると人気力士が見えてきます</p>`;
    return;
  }
  const total = Object.values(agg).reduce((s, v) => s + v, 0);
  const max = ranked[0][1];
  el.innerHTML = `
    <div class="note">今場所の取組予想を全員分集計（${voters}人・のべ${fmt(total)}件）。人気に乗るか、逆張りするか。</div>
    ${ranked.map(([name, c], i) => {
      const pct = Math.round(c / total * 100);
      const w = Math.max(4, Math.round(c / max * 100));
      const oshi = name === G.profile.oshiName ? "❤️" : "";
      return `
      <div style="display:flex;align-items:center;gap:8px;margin:5px 0">
        <span class="muted" style="width:18px;text-align:right;font-size:11px">${i + 1}</span>
        <span style="width:96px;font-weight:bold;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(name)}${oshi}</span>
        <div style="flex:1;background:#eee3cd;border-radius:4px;height:14px;overflow:hidden"><div style="width:${w}%;height:100%;background:var(--maroon)"></div></div>
        <span style="font-size:12px;width:74px;text-align:right">${c}件（${pct}%）</span>
      </div>`;
    }).join("")}`;
}

async function renderRanking() {
  const area = $("#ranking-area");
  if (!area) return;

  if (SB && G.bashoKey) list = await fetchLeaderboard(G.bashoKey);
  UI.lastRankList = list;
  area.innerHTML = rankingHTML(list);
}
function refreshRankArea() {
  const area = $("#ranking-area");
  if (area) area.innerHTML = rankingHTML(UI.lastRankList);
}
function rankingHTML(list) {
  const bz = computeBanzuke(list, G.finishedProcessed);
  // 本物の番付と同じく東西交互（1位=東、2位=西、3位=東…）
  const east = bz.table.filter((_, i) => i % 2 === 0);
  const west = bz.table.filter((_, i) => i % 2 === 1);
  const rows = [];
  let meRow = 0;
  for (let i = 0; i < east.length; i++) {
    const e = east[i], w = west[i];
    if ((e && e.me) || (w && w.me)) meRow = i;
    const cell = u => u ? `<span class="rank-chip l${u.level}">${u.levelName}</span><br>
      <span style="color:#a8861a;font-size:10px;line-height:1.4">${esc(u.title || "") || "&nbsp;"}</span><br>
      <b style="font-size:13px;cursor:pointer" data-comment="${esc(u.comment || "")}" onclick="showComment(this)">${esc(u.name)}${u.comment ? " 💬" : ""}</b>${u.me ? " ★" : ""}<br>
      <span class="muted" style="font-size:10px">的中 ${u.hits || 0}/${u.bets || 0}</span>` : "";
    rows.push(`<tr class="${(e && e.me) || (w && w.me) ? "me" : ""}">
      <td>${e ? e.pos : ""}</td><td style="text-align:center">${cell(e)}</td><td>${e ? fmt(e.points) : ""}</td>
      <td>${w ? fmt(w.points) : ""}</td><td style="text-align:center">${cell(w)}</td><td>${w ? w.pos : ""}</td></tr>`);
  }
  // 5行超は自分の前後だけ表示（展開で全員）
  let body, toggle = "";
  const gap = `<tr><td colspan="6" style="color:#b5ada0">・・・</td></tr>`;
  if (rows.length > 5 && !UI.rankFull) {
    const start = Math.max(0, Math.min(meRow - 2, rows.length - 5));
    body = rows.slice(start, start + 5).join("");
    if (start > 0) body = gap + body;
    if (start + 5 < rows.length) body += gap;
    toggle = `<button class="btn btn-ghost btn-sm btn-wide" style="margin-top:6px" onclick="UI.rankFull=true;refreshRankArea()">▼ 全${bz.total}名の番付を表示</button>`;
  } else {
    body = rows.join("");
    if (rows.length > 5) toggle = `<button class="btn btn-ghost btn-sm btn-wide" style="margin-top:6px" onclick="UI.rankFull=false;refreshRankArea()">▲ 自分の周りだけ表示</button>`;
  }
  const info = bashoInfo();
  return `
    <table class="banzuke">
      <tr><th>位</th><th>東</th><th>合</th><th>合</th><th>西</th><th>位</th></tr>
      ${body}
    </table>
    ${toggle}
    <p class="muted" style="margin-top:4px">
      ${SB ? `🟢 オンライン：${bz.total}名参加${info.current && !G.finishedProcessed ? "（場所中は速報値）" : scoreFrozen() ? "（速報値・確定は水曜10:00の番付編成会議）" : "（確定番付）"}` : "⚪ オフライン：自分のみ表示"}
      ${bz.pos ? `／あなた：${bz.pos}位` : ""}
    </p>`;
}

  rows = rows.slice().sort((a, b) => (b.final_points || 0) - (a.final_points || 0));
  const east = rows.filter((_, i) => i % 2 === 0);
  const west = rows.filter((_, i) => i % 2 === 1);
  const cell = u => u ? `<span class="rank-chip l${u.banzuke_level}">${esc(BANZUKE_NAMES[u.banzuke_level] || "-")}</span><br>
    <span style="color:#a8861a;font-size:10px;line-height:1.4">${esc(u.title || "") || "&nbsp;"}</span><br>

    <span class="muted" style="font-size:10px">的中 ${u.hits || 0}/${u.bets || 0}</span>` : "";
  const rowsHtml = [];
  for (let i = 0; i < east.length; i++) {
    const e = east[i], w = west[i];
    const isMe = (e && e.player_id === MYID) || (w && w.player_id === MYID);

// そのIDで再ログインすればいつでも同じデータに戻れる。未設定の匿名アカウントは
// 一度ログアウトすると二度とアクセスできなくなるため強めに警告する）
async function onLogout() {
  if (IS_ANON) {
    if (!confirm("ログインID・パスワードが未設定です。ログアウトすると、今のデータには二度とアクセスできなくなります。本当によろしいですか？")) return;
  } else {
    if (!confirm(`ログアウトします。ログインID「${G.profile.loginId || ""}」で、この端末からいつでも同じデータに戻れます。よろしいですか？`)) return;
  }
  // 保留中のデバウンス同期(最大1.5秒待ち)をキャンセルし、直前の操作(優勝予想の確定など)が
  // クラウドに反映される前にログアウトしてしまわないよう、ここで確実に一度同期しておく。
  // これをしないと、確定直後にログアウトした場合、その変更がクラウドに一度も届かないまま
  // ローカルデータだけ消去され、次回ログイン時に「確定が解除された」ように見えてしまう。
  clearTimeout(pushTimer);
  if (SB) { try { await pushProfile(); } catch (e) { console.warn("最終同期失敗:", e); } }
  if (SB) { try { await SB.auth.signOut(); } catch (e) { console.warn("サインアウト失敗:", e); } }
  ["gameState", "bets", "achievements", "quizHistory", "dailyBonus"].forEach(k => localStorage.removeItem(k));
  location.reload();
}
async function onReset() {
  if (!confirm("全データを消去して廃業します。本当によろしいですか？")) return;
  if (!confirm("称号・実績もすべて失われます。最終確認です。")) return;
  // Supabaseのセッションもサインアウトしておく。これをしないと、次の入門の儀で
  // 古い（既にログインID・パスワードを設定済みの）匿名セッションが再利用されてしまい、
  // 「同じパスワードは設定できません」等のエラーになる
  if (SB) { try { await SB.auth.signOut(); } catch (e) { console.warn("サインアウト失敗:", e); } }
  ["gameState", "bets", "achievements", "quizHistory", "dailyBonus"].forEach(k => localStorage.removeItem(k));
  location.reload();
}

// 的中率ドーナツグラフ
function drawHitChart() {
  const cv = $("#hitchart");
  if (!cv) return;
  const ctx = cv.getContext("2d");
  const s = G.stats;
  const total = s.totalHits + s.totalMisses;
  const cx = 80, cy = 80, R = 66, r = 44;
  ctx.clearRect(0, 0, 160, 160);
  const arc = (from, to, color) => {
    ctx.beginPath();
    ctx.arc(cx, cy, R, from, to);
    ctx.arc(cx, cy, r, to, from, true);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
  };
  if (total === 0) {
    arc(0, Math.PI * 2, "#e3dac0");
    ctx.fillStyle = "#8a7a60"; ctx.font = "12px serif"; ctx.textAlign = "center";
    ctx.fillText("まだ土俵に", cx, cy - 4);
    ctx.fillText("上がっていません", cx, cy + 14);
    return;
  }
  const start = -Math.PI / 2;
  const hitAngle = (s.totalHits / total) * Math.PI * 2;
  arc(start, start + hitAngle, "#2e7d32");
  arc(start + hitAngle, start + Math.PI * 2, "#d9564f");
  ctx.fillStyle = "#5c1a1a"; ctx.textAlign = "center";
  ctx.font = "bold 26px serif";
  ctx.fillText(Math.round(s.totalHits / total * 100) + "%", cx, cy + 2);
  ctx.font = "11px serif"; ctx.fillStyle = "#8a7a60";
  ctx.fillText("的中率", cx, cy + 20);
}

// ---------------- 収支グラフ ----------------
function drawChart() {
  const cv = $("#chart");
  if (!cv) return;
  const ctx = cv.getContext("2d");
  const W = cv.width, H = cv.height, P = 40;
  ctx.clearRect(0, 0, W, H);
  const hist = ((G.pointsHistory && G.pointsHistory.length) ? G.pointsHistory : [{ day: 0, points: G.points }]).slice();
  // 当日のリアルタイム値を追加（日次確定前の途中経過を反映）
  const info = bashoInfo();
  let liveIdx = -1;
  if (info.current && !G.finishedProcessed) {
    const last = hist[hist.length - 1];
    if (!last || last.points !== G.points || last.day !== info.current.day) {
      const x = hist.some(h => h.day === info.current.day) ? Math.min(15, info.current.day + 0.5) : info.current.day;
      hist.push({ day: x, points: G.points, live: true });
      liveIdx = hist.length - 1;
    }
  }
  const xs = d => P + (W - P * 2) * (d / 15);
  const vals = hist.map(h => h.points);
  const maxV = Math.max(33000, ...vals) * 1.05, minV = 0;
  const ys = v => H - P + (P * 2 - H) * ((v - minV) / (maxV - minV));
  ctx.strokeStyle = "#ddd2b8"; ctx.fillStyle = "#8a7a60"; ctx.font = "11px serif"; ctx.lineWidth = 1;
  for (let v = 0; v <= maxV; v += 10000) {
    ctx.beginPath(); ctx.moveTo(P, ys(v)); ctx.lineTo(W - P, ys(v)); ctx.stroke();
    ctx.fillText((v / 1000) + "k", 6, ys(v) + 4);
  }
  ctx.strokeStyle = "#c9a227"; ctx.setLineDash([5, 4]);
  ctx.beginPath(); ctx.moveTo(P, ys(33000)); ctx.lineTo(W - P, ys(33000)); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = "#a8861a"; ctx.fillText("関取 33,000", W - P - 70, ys(33000) - 5);
  ctx.fillStyle = "#8a7a60";
  for (let d = 0; d <= 15; d += 3) ctx.fillText(d === 0 ? "前" : d + "日", xs(d) - 8, H - P + 16);
  ctx.strokeStyle = "#5c1a1a"; ctx.lineWidth = 2.5;
  ctx.beginPath();
  hist.forEach((h, i) => { const x = xs(h.day), y = ys(h.points); i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); });
  ctx.stroke();
  hist.forEach(h => {
    ctx.fillStyle = h.live ? "#b3261e" : "#c9a227";
    ctx.beginPath(); ctx.arc(xs(h.day), ys(h.points), h.live ? 5 : 4, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = "#5c1a1a"; ctx.lineWidth = 1.5; ctx.stroke();
    if (h.live) {
      ctx.fillStyle = "#b3261e"; ctx.font = "bold 11px serif";
      ctx.fillText("現在 " + fmt(h.points), Math.min(xs(h.day) + 8, W - 90), ys(h.points) - 8);
    }
  });
}

// ---------------- クイズ ----------------
function openQuiz() {
  const q = getQuiz();
  if (!q) { showToast("📖 相撲クイズ", "本日の一問は回答済み。また明日！"); return; }
  oyakataSay("quiz");
  openModal(`
    <h2>📖 本日の相撲クイズ <span class="muted" style="font-size:11px">［${esc(q.quiz.cat)}］1日1問</span></h2>
    <p style="font-size:15px;line-height:1.8;margin-bottom:12px">${esc(q.quiz.q)}</p>
    ${q.quiz.c.map((c, i) => `<button class="quiz-choice" id="qc-${i}" onclick="onQuizAnswer(${q.idx},${i})">${"アイウエ"[i]}．${esc(c)}</button>`).join("")}
    <button class="btn btn-ghost btn-wide" id="quiz-quit" onclick="closeModal()">やめておく</button>
  `);
}
function onQuizAnswer(idx, choice) {
  const res = answerQuiz(idx, choice);
  document.querySelectorAll(".quiz-choice").forEach((b, i) => {
    b.disabled = true;
    if (i === QUIZ[idx].a) b.classList.add("correct");
    else if (i === choice) b.classList.add("wrong");
  });
  const quit = $("#quiz-quit");
  if (quit) quit.remove();
  const div = document.createElement("div");
  div.className = "day-summary";
  div.innerHTML = res.correct
    ? `<span class="net-plus">正解！ +${fmt(res.reward)}合</span>`
    : `<span class="net-minus">残念！</span><br><span class="muted">正解：${esc(res.answer)}</span>`;
  $(".modal").appendChild(div);
  renderHeader();
  // 結果を見せてから自動で閉じる
  setTimeout(() => { closeModal(); renderAll(); }, 2800);
}

// ---------------- 親方・トースト・モーダル ----------------
let oyakataTimer = null;
function oyakataSay(type) {
  // 駆け出しのうちは挨拶の代わりに手ほどきをする
  if (type === "greet" && G && G.stats.totalBets < 5) type = "beginner";
  const msg = pickRand(OYAKATA[type] || OYAKATA.greet);
  const bub = $("#oyakata-bubble");
  bub.textContent = msg;
  bub.style.display = "block";
  clearTimeout(oyakataTimer);
  oyakataTimer = setTimeout(() => { bub.style.display = "none"; }, 5000);
}
function showToast(title, body) {
  const area = $("#toast-area");
  const t = document.createElement("div");
  t.className = "toast";
  t.innerHTML = `<b>${title}</b><small>${body}</small>`;
  area.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}
function drainToasts() {
  while (toastQueue.length) {
    const t = toastQueue.shift();
    showToast(`🏅 称号獲得「${esc(t.name)}」`, esc(t.desc));
  }
}
function openModal(html) { $("#modal-area").innerHTML = `<div class="modal-bg"><div class="modal">${html}</div></div>`; }
function closeModal() { $("#modal-area").innerHTML = ""; }

// ---------------- オンボーディング（入門の儀） ----------------
function renderOnboarding() {
  const oshiOpts = rikishiByBanzuke().map(r => `<option value="${esc(r.name)}">${esc(r.name)}（${rankLabel(r.rank)}）</option>`).join("");
  const acctFields = sbConfigured() ? `
    <p style="font-size:13px;font-weight:bold;margin:10px 0 6px">ログインID・パスワードを設定（他の端末からもログインできます）</p>
    <div class="form-row"><label>ログインID</label><input id="onb-loginid" maxlength="20" placeholder="半角英数字4〜20文字"></div>
    <div class="form-row"><label>パスワード</label><input id="onb-password" type="text" maxlength="50" placeholder="6文字以上" autocomplete="new-password"></div>
    <div class="form-row"><label>パスワード(確認)</label><input id="onb-password2" type="text" maxlength="50" autocomplete="new-password"></div>
    <p class="muted" style="font-size:11px;line-height:1.6">※実在するメールアドレスは一切収集しません。パスワードはハッシュ化されて保存され、運営者を含め誰も元のパスワードを見ることはできません。</p>
  ` : "";
  openModal(`
    <div class="onb-logo">トト相撲</div>
    <div class="onb-sub">— 大相撲 取組予想ゲーム ONLINE・入門の儀 —</div>
    <div class="form-row"><label>四股名</label><input id="onb-name" maxlength="10" placeholder="例：朝青空"></div>
    <p style="font-size:13px;font-weight:bold;margin:10px 0 6px">所属一門を選ぶ</p>
    <div class="ichimon-grid" id="onb-ichimon">
      ${ICHIMON.map(x => `<button class="ichimon-card" data-im="${x}" onclick="onbIchimon('${x}')">${x}一門<br>
        <span style="font-size:11px;font-weight:normal;opacity:.75">${(ICHIMON_REPS[x] || []).join("・")}</span></button>`).join("")}
    </div>
    <p style="font-size:13px;font-weight:bold;margin:10px 0 6px">推し力士を選ぶ</p>
    <div class="form-row"><select id="onb-oshi">${oshiOpts}</select></div>
    <p style="font-size:13px;font-weight:bold;margin:10px 0 6px">ひとこと（番付表で表示・任意）</p>
    <div class="form-row"><input id="onb-comment" maxlength="20" placeholder="例：ごっつぁんです！（20文字まで）"></div>
    ${acctFields}
    <p class="muted center" style="margin:8px 0">持ち米 15,000合 からのスタート！<br>全プレイヤー共通の取組・各取組の直前まで受付</p>
    <button class="btn btn-gold btn-wide" onclick="onbStart(this)">🥁 入門する</button>
    ${sbConfigured() ? `<button class="btn btn-ghost btn-wide" style="margin-top:6px" onclick="renderSignIn()">すでにログインIDをお持ちの方はこちら</button>` : ""}
  `);
}

// 別端末からの復帰ログイン画面
function renderSignIn() {
  openModal(`
    <div class="onb-logo">トト相撲</div>
    <div class="onb-sub">— ログイン —</div>
    <div class="form-row"><label>ログインID</label><input id="si-loginid" maxlength="20"></div>
    <div class="form-row"><label>パスワード</label><input id="si-password" type="text" maxlength="50" autocomplete="current-password"></div>
    <p class="muted" style="font-size:11px;line-height:1.6">※持ち米・称号・推し力士・的中履歴・実績・現在の未精算ベットなど、これまでのデータがすべて復元されます。</p>
    <div class="center" style="margin-top:10px"><button class="btn btn-primary btn-wide" onclick="onbSignIn()">ログイン</button></div>
    <button class="btn btn-ghost btn-wide" style="margin-top:6px" onclick="renderOnboarding()">戻る</button>
  `);
}
async function onbSignIn() {
  const loginId = ($("#si-loginid").value || "").trim();
  const pw = $("#si-password").value || "";
  if (!loginId || !pw) { alert("ログインIDとパスワードを入力してください"); return; }
  const res = await signInWithLoginId(loginId, pw);
  if (!res.ok) { alert(res.msg); return; }
  const row = res.row;
  if (!row && !res.fullState) { alert("アカウント情報の取得に失敗しました。しばらくしてからもう一度お試しください。"); return; }

  if (res.fullState) {
    // 全データ（推し力士・実績・現在のベットなど）をそのまま復元
    hydrateG(res.fullState);
    G.profile.loginId = loginId;
  } else {
    // フルセーブが無い（この更新前にログインID設定した端末をまだ一度も開いていない）:
    // 集計値だけの簡易復元。元の端末を一度開けば次回から全データが復元されるようになる
    G = {
      profile: { shikona: row.shikona, ichimon: row.ichimon, oshiName: RIKISHI[0].name, oshiId: RIKISHI[0].id, title: row.title || "t1_01", comment: row.comment || "", loginId },
      points: (typeof row.points === "number") ? row.points : START_POINTS,
      achievements: [row.title || "t1_01"],
      stats: DEFAULT_STATS(),
      bashoCount: row.basho_count || 1,
      banzukeLevel: row.banzuke_level || 3,
      bashoKey: null,
      bets: [], ewBets: [], dayAgg: {},
      yushoBet: null, sanshoBet: null,
      pointsHistory: [], dayLog: [], betDays: [],
      hitsThisBasho: row.hits || 0, betsThisBasho: row.bets || 0,
      finishedProcessed: false, finalPoints: (typeof row.final_points === "number") ? row.final_points : null, banzukeAnnounced: false,
      answeredQuiz: [], quizCatCorrect: {}
    };
  }
  save();
  closeModal();
  await ensureBashoState();
  renderAll();
  showToast("🥁 おかえりなさい", `${G.profile.shikona} 関、ログインしました`);
  if (!res.fullState) {
    setTimeout(() => alert("持ち米・称号などの基本情報を復元しました。推し力士はお手数ですがプロフィールから選び直してください（元の端末をこの更新以降まだ開いていないため、実績・ベット履歴を復元できませんでした。元の端末を一度開けば、次回からは全データが復元されます）。"), 400);
  }
}
function onbIchimon(x) {
  UI.onb.ichimon = x;
  document.querySelectorAll(".ichimon-card").forEach(b => b.classList.toggle("sel", b.dataset.im === x));
}
async function onbStart(btn) {
  // 二重送信防止（通信待ち中の連打でアカウントリンク処理が重複しないように）
  if (btn) { if (btn.disabled) return; btn.disabled = true; }
  try {
    const name = $("#onb-name").value.trim().slice(0, 10);
    if (!name) { alert("四股名を入力してください"); return; }
    if (!UI.onb.ichimon) { alert("所属一門を選んでください"); return; }

    const wantsAccount = sbConfigured();
    let loginId = "", pw = "";
    if (wantsAccount) {
      loginId = ($("#onb-loginid").value || "").trim();
      pw = $("#onb-password").value || "";
      const pw2 = $("#onb-password2").value || "";
      if (!validLoginId(loginId)) { alert("ログインIDは半角英数字とアンダースコアで4〜20文字にしてください"); return; }
      if (pw.length < 6) { alert("パスワードは6文字以上にしてください"); return; }
      if (pw !== pw2) { alert("パスワードが一致しません"); return; }
    }

    await sbInit(); // 匿名セッションを確立（このUUIDのまま以後アカウント化する）
    let linkedOk = false;
    if (SB) {
      const { data: dup } = await SB.from("players").select("id").eq("shikona", name).limit(1);
      if (dup && dup.length) { alert("その四股名は既に使われています。別の四股名にしてください"); return; }
      if (wantsAccount) {
        const link = await linkCredentials(loginId, pw);
        if (!link.ok) { alert(link.msg); return; }
        linkedOk = true;
      }
    } else if (wantsAccount) {
      console.warn("オンライン接続に失敗したため、ログインID設定はスキップされました");
    }

    newGame(name, UI.onb.ichimon, $("#onb-oshi").value, ($("#onb-comment") ? $("#onb-comment").value : "").trim());
    if (linkedOk) { G.profile.loginId = loginId; save(); }
    await pushProfile(); // デバウンス(1.5秒)を待たず即時同期し、この時点でplayers/player_savesの行を確実に作成する
    closeModal();
    await ensureBashoState();
    renderAll();
    if (wantsAccount && !linkedOk) showToast("⚠ ログインID未設定", "通信状況によりスキップされました。プロフィール画面から後で設定できます");
    showToast("🥁 入門の儀 完了", `${UI.onb.ichimon}一門・${name} 関の誕生だ！`);
    // 遊び方の説明は renderTorikumi() が自動表示するチュートリアル（6スライド）に一本化
  } catch (e) {
    console.error("入門の儀に失敗しました:", e);
    alert("エラーが発生しました。お手数ですが、もう一度お試しください。（" + (e && e.message || e) + "）");
  } finally {
    if (btn) btn.disabled = false;
  }
}

// （旧「親方の心得」モーダルは、6スライドの遊び方チュートリアルに統合したため廃止）

// タブを閉じる/バックグラウンドに回す直前に、デバウンス待ち中の同期があれば
// 即座にフラッシュしておく（優勝予想の確定などの直後にタブを閉じた場合に、
// クラウドへ一度も届かず消えてしまうのを防ぐための保険）
function flushPendingSync() {
  if (pushTimer) { clearTimeout(pushTimer); pushTimer = null; if (SB) pushProfile(); }
}
document.addEventListener("visibilitychange", () => { if (document.visibilityState === "hidden") flushPendingSync(); });
window.addEventListener("pagehide", flushPendingSync);

init();
</script>
