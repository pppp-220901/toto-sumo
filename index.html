function rankingHTML(list) {
  const bz = computeBanzuke(list, G.finishedProcessed);
  // 本物の番付と同じく東西交互（1位=東、2位=西、3位=東…）
  const east = bz.table.filter((_, i) => i % 2 === 0);
  const west = bz.table.filter((_, i) => i % 2 === 1);
  const rows = [];
  let meRow = 0;
  for (let i = 0; i < east.length; i++) {
    const e = east[i], w = west[i];
    if ((e && e.me) || (w && w.me)) meRow = i;
    const cell = u => u ? `<span class="rank-chip l${u.level}">${u.levelName}</span><br>
      <span style="color:#a8861a;font-size:10px;line-height:1.4">${esc(u.title || "") || "&nbsp;"}</span><br>
      <b style="font-size:13px;cursor:pointer" data-comment="${esc(u.comment || "")}" onclick="showComment(this)">${esc(u.name)}${u.comment ? " 💬" : ""}</b>${u.me ? " ★" : ""}<br>
      <span class="muted" style="font-size:10px">的中 ${u.hits || 0}/${u.bets || 0}</span>` : "";
    rows.push(`<tr class="${(e && e.me) || (w && w.me) ? "me" : ""}">
      <td>${e ? e.pos : ""}</td><td style="text-align:center">${cell(e)}</td><td>${e ? fmt(e.points) : ""}</td>
      <td>${w ? fmt(w.points) : ""}</td><td style="text-align:center">${cell(w)}</td><td>${w ? w.pos : ""}</td></tr>`);
  }
  // 5行超は自分の前後だけ表示（展開で全員）
  let body, toggle = "";
  const gap = `<tr><td colspan="6" style="color:#b5ada0">・・・</td></tr>`;
  if (rows.length > 5 && !UI.rankFull) {
    const start = Math.max(0, Math.min(meRow - 2, rows.length - 5));
    body = rows.slice(start, start + 5).join("");
    if (start > 0) body = gap + body;
    if (start + 5 < rows.length) body += gap;
    toggle = `<button class="btn btn-ghost btn-sm btn-wide" style="margin-top:6px" onclick="UI.rankFull=true;refreshRankArea()">▼ 全${bz.total}名の番付を表示</button>`;
  } else {
    body = rows.join("");
    if (rows.length > 5) toggle = `<button class="btn btn-ghost btn-sm btn-wide" style="margin-top:6px" onclick="UI.rankFull=false;refreshRankArea()">▲ 自分の周りだけ表示</button>`;
  }
  const info = bashoInfo();
  return `
    <table class="banzuke">
      <tr><th>位</th><th>東</th><th>合</th><th>合</th><th>西</th><th>位</th></tr>
      ${body}
    </table>
    ${toggle}
    <p class="muted" style="margin-top:4px">
      ${SB ? `🟢 オンライン：${bz.total}名参加${info.current && !G.finishedProcessed ? "（場所中は速報値）" : scoreFrozen() ? "（速報値・確定は水曜10:00の番付編成会議）" : "（確定番付）"}` : "⚪ オフライン：自分のみ表示"}
      ${bz.pos ? `／あなた：${bz.pos}位` : ""}
    </p>`;
}

// 的中率ドーナツグラフ
function drawHitChart() {
  const cv = $("#hitchart");
  if (!cv) return;
  const ctx = cv.getContext("2d");
  const s = G.stats;
  const total = s.totalHits + s.totalMisses;
  const cx = 80, cy = 80, R = 66, r = 44;
  ctx.clearRect(0, 0, 160, 160);
  const arc = (from, to, color) => {
    ctx.beginPath();
    ctx.arc(cx, cy, R, from, to);
    ctx.arc(cx, cy, r, to, from, true);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
  };
  if (total === 0) {
    arc(0, Math.PI * 2, "#e3dac0");
    ctx.fillStyle = "#8a7a60"; ctx.font = "12px serif"; ctx.textAlign = "center";
    ctx.fillText("まだ土俵に", cx, cy - 4);
    ctx.fillText("上がっていません", cx, cy + 14);
    return;
  }
  const start = -Math.PI / 2;
  const hitAngle = (s.totalHits / total) * Math.PI * 2;
  arc(start, start + hitAngle, "#2e7d32");
  arc(start + hitAngle, start + Math.PI * 2, "#d9564f");
  ctx.fillStyle = "#5c1a1a"; ctx.textAlign = "center";
  ctx.font = "bold 26px serif";
  ctx.fillText(Math.round(s.totalHits / total * 100) + "%", cx, cy + 2);
  ctx.font = "11px serif"; ctx.fillStyle = "#8a7a60";
  ctx.fillText("的中率", cx, cy + 20);
}

// ---------------- 収支グラフ ----------------
function drawChart() {
  const cv = $("#chart");
  if (!cv) return;
  const ctx = cv.getContext("2d");
  const W = cv.width, H = cv.height, P = 40;
  ctx.clearRect(0, 0, W, H);
  const hist = ((G.pointsHistory && G.pointsHistory.length) ? G.pointsHistory : [{ day: 0, points: G.points }]).slice();
  // 当日のリアルタイム値を追加（日次確定前の途中経過を反映）
  const info = bashoInfo();
  let liveIdx = -1;
  if (info.current && !G.finishedProcessed) {
    const last = hist[hist.length - 1];
    if (!last || last.points !== G.points || last.day !== info.current.day) {
      const x = hist.some(h => h.day === info.current.day) ? Math.min(15, info.current.day + 0.5) : info.current.day;
      hist.push({ day: x, points: G.points, live: true });
      liveIdx = hist.length - 1;
    }
  }
  const xs = d => P + (W - P * 2) * (d / 15);
  const vals = hist.map(h => h.points);
  const maxV = Math.max(33000, ...vals) * 1.05, minV = 0;
  const ys = v => H - P + (P * 2 - H) * ((v - minV) / (maxV - minV));
  ctx.strokeStyle = "#ddd2b8"; ctx.fillStyle = "#8a7a60"; ctx.font = "11px serif"; ctx.lineWidth = 1;
  for (let v = 0; v <= maxV; v += 10000) {
    ctx.beginPath(); ctx.moveTo(P, ys(v)); ctx.lineTo(W - P, ys(v)); ctx.stroke();
    ctx.fillText((v / 1000) + "k", 6, ys(v) + 4);
  }
  ctx.strokeStyle = "#c9a227"; ctx.setLineDash([5, 4]);
  ctx.beginPath(); ctx.moveTo(P, ys(33000)); ctx.lineTo(W - P, ys(33000)); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = "#a8861a"; ctx.fillText("関取 33,000", W - P - 70, ys(33000) - 5);
  ctx.fillStyle = "#8a7a60";
  for (let d = 0; d <= 15; d += 3) ctx.fillText(d === 0 ? "前" : d + "日", xs(d) - 8, H - P + 16);
  ctx.strokeStyle = "#5c1a1a"; ctx.lineWidth = 2.5;
  ctx.beginPath();
  hist.forEach((h, i) => { const x = xs(h.day), y = ys(h.points); i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); });
  ctx.stroke();
  hist.forEach(h => {
    ctx.fillStyle = h.live ? "#b3261e" : "#c9a227";
    ctx.beginPath(); ctx.arc(xs(h.day), ys(h.points), h.live ? 5 : 4, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = "#5c1a1a"; ctx.lineWidth = 1.5; ctx.stroke();
    if (h.live) {
      ctx.fillStyle = "#b3261e"; ctx.font = "bold 11px serif";
      ctx.fillText("現在 " + fmt(h.points), Math.min(xs(h.day) + 8, W - 90), ys(h.points) - 8);
    }
  });
}

  div.innerHTML = res.correct
    ? `<span class="net-plus">正解！ +${fmt(res.reward)}合</span>`
    : `<span class="net-minus">残念！</span><br><span class="muted">正解：${esc(res.answer)}</span>`;
  $(".modal").appendChild(div);
  renderHeader();
  // 結果を見せてから自動で閉じる
  setTimeout(() => { closeModal(); renderAll(); }, 2800);
}

// ---------------- 親方・トースト・モーダル ----------------
let oyakataTimer = null;
function oyakataSay(type) {
  // 駆け出しのうちは挨拶の代わりに手ほどきをする
  if (type === "greet" && G && G.stats.totalBets < 5) type = "beginner";
  const msg = pickRand(OYAKATA[type] || OYAKATA.greet);
  const bub = $("#oyakata-bubble");
  bub.textContent = msg;
  bub.style.display = "block";
  clearTimeout(oyakataTimer);
  oyakataTimer = setTimeout(() => { bub.style.display = "none"; }, 5000);
}
function showToast(title, body) {
  const area = $("#toast-area");
  const t = document.createElement("div");
  t.className = "toast";
  t.innerHTML = `<b>${title}</b><small>${body}</small>`;
  area.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}
function drainToasts() {
  while (toastQueue.length) {
    const t = toastQueue.shift();
    showToast(`🏅 称号獲得「${esc(t.name)}」`, esc(t.desc));
  }
}
function openModal(html) { $("#modal-area").innerHTML = `<div class="modal-bg"><div class="modal">${html}</div></div>`; }
function closeModal() { $("#modal-area").innerHTML = ""; }

// ---------------- オンボーディング（入門の儀） ----------------
function renderOnboarding() {
  const oshiOpts = rikishiByBanzuke().map(r => `<option value="${esc(r.name)}">${esc(r.name)}（${rankLabel(r.rank)}）</option>`).join("");
  openModal(`
    <div class="onb-logo">トト相撲</div>
    <div class="onb-sub">— 大相撲 取組予想ゲーム ONLINE・入門の儀 —</div>
    <div class="form-row"><label>四股名</label><input id="onb-name" maxlength="10" placeholder="例：朝青空"></div>
    <p style="font-size:13px;font-weight:bold;margin:10px 0 6px">所属一門を選ぶ</p>
    <div class="ichimon-grid" id="onb-ichimon">
      ${ICHIMON.map(x => `<button class="ichimon-card" data-im="${x}" onclick="onbIchimon('${x}')">${x}一門<br>
        <span style="font-size:11px;font-weight:normal;opacity:.75">${(ICHIMON_REPS[x] || []).join("・")}</span></button>`).join("")}
    </div>
    <p style="font-size:13px;font-weight:bold;margin:10px 0 6px">推し力士を選ぶ</p>
    <div class="form-row"><select id="onb-oshi">${oshiOpts}</select></div>
    <p style="font-size:13px;font-weight:bold;margin:10px 0 6px">ひとこと（番付表で表示・任意）</p>
    <div class="form-row"><input id="onb-comment" maxlength="20" placeholder="例：ごっつぁんです！（20文字まで）"></div>
    <p class="muted center" style="margin:8px 0">持ち米 15,000合 からのスタート！<br>全プレイヤー共通の取組・各取組の直前まで受付</p>
    <button class="btn btn-gold btn-wide" onclick="onbStart()">🥁 入門する</button>
  `);
}
function onbIchimon(x) {
  UI.onb.ichimon = x;
  document.querySelectorAll(".ichimon-card").forEach(b => b.classList.toggle("sel", b.dataset.im === x));
}
async function onbStart() {
  const name = $("#onb-name").value.trim().slice(0, 10);
  if (!name) { alert("四股名を入力してください"); return; }
  if (!UI.onb.ichimon) { alert("所属一門を選んでください"); return; }
  newGame(name, UI.onb.ichimon, $("#onb-oshi").value, ($("#onb-comment") ? $("#onb-comment").value : "").trim());
  closeModal();
  await sbInit();
  await ensureBashoState();
  renderAll();
  showToast("🥁 入門の儀 完了", `${UI.onb.ichimon}一門・${name} 関の誕生だ！`);
  showBeginnerGuide();
}

// 親方の心得（入門直後のチュートリアル）
function showBeginnerGuide() {
  openModal(`
    <h2 style="color:var(--maroon)">👹 親方の心得</h2>
    <div style="background:#fff;border:2px solid var(--maroon);border-radius:12px;padding:14px;font-size:14px;line-height:2">
      「よう来たな、新弟子。トト相撲の稽古をつけてやろう。<br><br>
      一、初日は<b>🚩懸賞のかかった一番</b>と、<b>⚖東西対抗戦</b>に賭けるのがオススメじゃ。どちらも<b>オッズ3倍</b>、覚えやすくて実入りも良い。<br><br>
      一、取組は<b>各組の直前まで</b>受付。オッズは力士の調子で毎日動く生き物じゃ。<br><br>
      一、<b>🍲ちゃんこ</b>と<b>📖相撲クイズ</b>は毎日タダで米が増える。忘れるでない。<br><br>
      一、腕に覚えが出てきたら「場所予想」の<b>優勝予想</b>じゃ。早く当てるほど、千秋楽の持ち米が<b>丸ごと倍</b>になる大勝負よ。<br><br>
      米が尽きたら……まあ、その時はわしに任せい。」
    </div>
    <button class="btn btn-gold btn-wide" style="margin-top:12px" onclick="closeModal();playPendingModals();renderAll();setTimeout(()=>oyakataSay('beginner'),800)">🥁 稽古開始！</button>
  `);
}

init();
</script>
</body></html>
