<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>トト相撲 ONLINE — 大相撲予想ゲーム</title>
<style>
:root {
  --maroon: #5c1a1a; --maroon-d: #421111; --gold: #c9a227; --gold-l: #e8d48b;
  --washi: #f7f2e4; --washi-d: #ece3cc; --ink: #2b2320; --red: #b3261e;
  --green: #2e7d32; --east: #8c3030; --west: #2f4a6e;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", "Noto Serif JP", serif;
  background: var(--washi); color: var(--ink);
  background-image: repeating-linear-gradient(45deg, rgba(0,0,0,.012) 0 2px, transparent 2px 6px);
  min-height: 100vh;
}
#app { max-width: 520px; margin: 0 auto; padding-bottom: 90px; }
button { font-family: inherit; cursor: pointer; }
input, select { font-family: inherit; font-size: 15px; }

/* ---------- ヘッダー ---------- */
header {
  background: linear-gradient(180deg, var(--maroon), var(--maroon-d));
  color: var(--washi); padding: 12px 14px 10px; position: sticky; top: 0; z-index: 50;
  border-bottom: 3px solid var(--gold); box-shadow: 0 2px 8px rgba(0,0,0,.3);
}
.hdr-top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
.hdr-name { font-weight: bold; font-size: 16px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.hdr-name .title-part { color: var(--gold-l); font-size: 13px; }
.hdr-basho { font-size: 12px; color: var(--gold-l); white-space: nowrap; }
.hdr-mid { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
.hdr-points { font-size: 22px; font-weight: bold; color: var(--gold-l); letter-spacing: 1px; }
.hdr-points small { font-size: 12px; color: var(--washi); }
.hdr-rank { font-size: 12px; text-align: right; }
.progress-wrap { background: rgba(0,0,0,.4); border-radius: 6px; height: 8px; margin-top: 6px; overflow: hidden; }
.progress-bar { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-l)); border-radius: 6px; transition: width .5s; }
.progress-label { font-size: 10px; color: var(--gold-l); margin-top: 2px; text-align: right; }

/* ---------- タブ ---------- */
nav { display: flex; background: var(--maroon-d); position: sticky; top: 86px; z-index: 49; border-bottom: 2px solid var(--gold); }
nav button {
  flex: 1; padding: 11px 4px; background: none; border: none; color: #cdb9a5;
  font-size: 14px; font-weight: bold; border-bottom: 3px solid transparent;
}
nav button.active { color: var(--gold-l); border-bottom-color: var(--gold); background: rgba(255,255,255,.05); }

main { padding: 12px; }
.section-title { font-size: 15px; font-weight: bold; border-left: 4px solid var(--maroon); padding-left: 8px; margin: 14px 0 8px; }

/* ---------- 取組カード ---------- */
.day-banner {
  background: var(--maroon); color: var(--gold-l); text-align: center; padding: 8px;
  border-radius: 8px; font-weight: bold; font-size: 15px; margin-bottom: 10px;
  border: 1px solid var(--gold);
}
.bout-card {
  background: #fff; border: 1px solid #d8cdb4; border-radius: 10px; margin-bottom: 10px;
  overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.08);
}
.bout-card.kensho { border: 2px solid var(--red); }
.kensho-banner { background: var(--red); color: #fff; font-size: 11px; text-align: center; padding: 3px; font-weight: bold; }
.bout-main { display: flex; align-items: stretch; }
.fighter { flex: 1; padding: 10px 6px; text-align: center; border: none; background: none; position: relative; }
.fighter:active { background: var(--washi-d); }
.fighter.picked-east { background: linear-gradient(180deg, #fdf0f0, #f6dada); box-shadow: inset 0 0 0 2px var(--east); border-radius: 8px; }
.fighter.picked-west { background: linear-gradient(180deg, #eef3fa, #dce6f3); box-shadow: inset 0 0 0 2px var(--west); border-radius: 8px; }
.f-side { font-size: 10px; color: #fff; padding: 1px 8px; border-radius: 3px; display: inline-block; }
.f-side.east { background: var(--east); } .f-side.west { background: var(--west); }
.f-name { font-size: 17px; font-weight: bold; margin: 3px 0 1px; }
.f-rank { font-size: 11px; color: #7a6a55; }
.f-odds { font-size: 14px; font-weight: bold; color: var(--maroon); margin-top: 3px; }
.f-record { font-size: 10px; color: #998; }
.f-tag { font-size: 10px; border-radius: 3px; padding: 0 4px; display: inline-block; margin-top: 2px; }
.tag-injured { background: #fff0e0; color: #b35900; border: 1px solid #e0b080; }
.tag-ichimon { background: #ece4f5; color: #5b3a8c; border: 1px solid #b9a3d9; }
.tag-oshi { background: #ffe9f0; color: #c2185b; border: 1px solid #f0a0bd; }
.vs { display: flex; align-items: center; font-size: 12px; color: #aa9; padding: 0 2px; }
.bet-panel { background: var(--washi-d); padding: 10px; border-top: 1px dashed #c5b890; }
.bet-row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; flex-wrap: wrap; }
.bet-row label { font-size: 12px; }
.bet-row input[type=number] { width: 100px; padding: 6px; border: 1px solid #bbb; border-radius: 6px; }
.bet-row select { padding: 6px; border: 1px solid #bbb; border-radius: 6px; }
.bet-status { font-size: 12px; padding: 6px 10px; background: #f3ecd8; border-top: 1px solid #e0d6ba; display: flex; justify-content: space-between; align-items: center; }
.bet-status b { color: var(--maroon); }

.btn { border: none; border-radius: 8px; padding: 9px 16px; font-weight: bold; font-size: 14px; }
.btn-primary { background: var(--maroon); color: var(--gold-l); }
.btn-primary:disabled { background: #b5a99a; color: #eee; }
.btn-gold { background: linear-gradient(180deg, var(--gold-l), var(--gold)); color: var(--maroon-d); border: 1px solid #a8861a; }
.btn-ghost { background: none; border: 1px solid #b5a587; color: #6b5d49; }
.btn-danger { background: var(--red); color: #fff; }
.btn-wide { width: 100%; padding: 13px; font-size: 16px; }
.btn-sm { padding: 5px 10px; font-size: 12px; }

.bonus-row { display: flex; gap: 8px; margin-bottom: 12px; }
.bonus-btn {
  flex: 1; background: #fff; border: 1.5px solid var(--gold); border-radius: 10px; padding: 10px 6px;
  text-align: center; font-size: 13px; font-weight: bold; color: var(--maroon);
}
.bonus-btn:disabled { opacity: .45; border-color: #ccc; color: #999; }
.bonus-btn .big { font-size: 18px; display: block; }

/* ---------- 場所予想 ---------- */
.card { background: #fff; border: 1px solid #d8cdb4; border-radius: 10px; padding: 14px; margin-bottom: 12px; }
.card h3 { font-size: 15px; color: var(--maroon); margin-bottom: 8px; }
.card .note { font-size: 12px; color: #8a7a60; margin-bottom: 8px; line-height: 1.6; }
.form-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
.form-row label { font-size: 13px; min-width: 58px; font-weight: bold; }
.form-row select, .form-row input { flex: 1; padding: 8px; border: 1px solid #bbb; border-radius: 6px; min-width: 120px; }
.locked-box { background: var(--washi-d); border-radius: 8px; padding: 10px; font-size: 14px; line-height: 1.8; }
.locked-box .seal { color: var(--red); font-weight: bold; border: 2px solid var(--red); border-radius: 4px; padding: 0 6px; font-size: 11px; }

/* ---------- 米取表 ---------- */
canvas#chart { width: 100%; background: #fff; border: 1px solid #d8cdb4; border-radius: 10px; }
table.banzuke { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #d8cdb4; font-size: 12px; }
table.banzuke th { background: var(--maroon); color: var(--gold-l); padding: 6px 4px; font-size: 12px; }
table.banzuke td { padding: 5px 6px; border-bottom: 1px solid #eee5d0; text-align: center; }
table.banzuke tr.me td { background: #fdf3d8; font-weight: bold; }
.rank-chip { display: inline-block; border-radius: 3px; padding: 0 5px; font-size: 11px; color: #fff; background: #8a7a60; }
.rank-chip.l9 { background: var(--red); } .rank-chip.l8 { background: #c2185b; }
.rank-chip.l7 { background: #6a1b9a; } .rank-chip.l6 { background: #283593; }
.rank-chip.l5 { background: #2e7d32; } .rank-chip.l4 { background: #8a7a60; } .rank-chip.l3 { background: #aaa; }

.title-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.title-chip {
  border: 1px solid var(--gold); border-radius: 14px; padding: 4px 10px; font-size: 12px;
  background: #fffbe8; color: var(--maroon); font-weight: bold;
}
.title-chip.locked { border-color: #ccc; background: #f2f0ea; color: #b5ada0; font-weight: normal; }
.title-chip.selected { background: var(--maroon); color: var(--gold-l); }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 13px; }
.stats-grid div { background: #fff; border: 1px solid #e3dac0; border-radius: 8px; padding: 8px; }
.stats-grid b { color: var(--maroon); }

/* ---------- 親方 ---------- */
#oyakata { position: fixed; right: 10px; bottom: 12px; z-index: 60; display: flex; flex-direction: column; align-items: flex-end; max-width: 78%; }
#oyakata-bubble {
  background: #fff; border: 2px solid var(--maroon); border-radius: 12px; padding: 9px 12px;
  font-size: 13px; line-height: 1.6; margin-bottom: 6px; box-shadow: 0 3px 10px rgba(0,0,0,.2);
  display: none; position: relative;
}
#oyakata-bubble:after {
  content: ""; position: absolute; bottom: -9px; right: 22px;
  border: 6px solid transparent; border-top-color: var(--maroon);
}
#oyakata-face {
  width: 54px; height: 54px; border-radius: 50%; background: var(--maroon);
  border: 2.5px solid var(--gold); display: flex; align-items: center; justify-content: center;
  font-size: 28px; box-shadow: 0 3px 10px rgba(0,0,0,.3); cursor: pointer; user-select: none;
}

/* ---------- モーダル ---------- */
.modal-bg {
  position: fixed; inset: 0; background: rgba(20,10,5,.65); z-index: 100;
  display: flex; align-items: center; justify-content: center; padding: 16px;
}
.modal {
  background: var(--washi); border-radius: 14px; border: 2px solid var(--gold);
  max-width: 480px; width: 100%; max-height: 86vh; overflow-y: auto; padding: 18px;
  box-shadow: 0 10px 40px rgba(0,0,0,.5);
}
.modal h2 { color: var(--maroon); font-size: 18px; text-align: center; margin-bottom: 12px; }
.modal h2.banner { background: var(--maroon); color: var(--gold-l); padding: 8px; border-radius: 8px; }
.result-line { display: flex; justify-content: space-between; align-items: center; padding: 7px 4px; border-bottom: 1px dashed #d8cdb4; font-size: 13.5px; }
.result-line .km { color: #8a7a60; font-size: 11px; }
.hit { color: var(--green); font-weight: bold; }
.miss { color: var(--red); font-weight: bold; }
.day-summary { background: #fff; border: 1.5px solid var(--gold); border-radius: 10px; padding: 12px; margin-top: 12px; text-align: center; font-size: 15px; }
.day-summary .net-plus { color: var(--green); font-size: 22px; font-weight: bold; }
.day-summary .net-minus { color: var(--red); font-size: 22px; font-weight: bold; }

/* ---------- オンボーディング ---------- */
.onb-logo { text-align: center; font-size: 34px; font-weight: bold; color: var(--maroon); letter-spacing: 6px; margin: 6px 0 2px; }
.onb-sub { text-align: center; font-size: 12px; color: #8a7a60; margin-bottom: 16px; }
.ichimon-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.ichimon-card {
  border: 1.5px solid #c5b890; border-radius: 10px; padding: 12px 8px; background: #fff;
  text-align: center; font-weight: bold; font-size: 15px;
}
.ichimon-card.sel { border-color: var(--maroon); background: var(--maroon); color: var(--gold-l); }

/* ---------- トースト ---------- */
#toast-area { position: fixed; top: 100px; left: 50%; transform: translateX(-50%); z-index: 200; width: 90%; max-width: 420px; }
.toast {
  background: linear-gradient(180deg, #3a2c10, #241a08); color: var(--gold-l); border: 1.5px solid var(--gold);
  border-radius: 10px; padding: 10px 14px; margin-bottom: 8px; font-size: 14px;
  box-shadow: 0 5px 20px rgba(0,0,0,.4); animation: pop .3s ease;
}
.toast small { color: #cbb; display: block; font-size: 11px; }
@keyframes pop { from { transform: scale(.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

.quiz-choice { display: block; width: 100%; text-align: left; background: #fff; border: 1.5px solid #c5b890; border-radius: 8px; padding: 11px; margin-bottom: 7px; font-size: 14px; }
.quiz-choice.correct { border-color: var(--green); background: #e8f5e9; font-weight: bold; }
.quiz-choice.wrong { border-color: var(--red); background: #fdecea; }
.offseason-note { background: #fff; border: 2px dashed var(--gold); border-radius: 12px; padding: 16px; text-align: center; margin-bottom: 14px; line-height: 1.9; }

/* ---------- アコーディオン ---------- */
details.acc { margin-bottom: 12px; }
details.acc > summary { list-style: none; cursor: pointer; user-select: none; position: relative; }
details.acc > summary::-webkit-details-marker { display: none; }
details.acc > summary .acc-arrow { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); transition: transform .2s; font-size: 12px; }
details.acc[open] > summary .acc-arrow { transform: translateY(-50%) rotate(180deg); }
details.acc > .acc-body { padding-top: 10px; }
.muted { color: #8a7a60; font-size: 12px; }
.center { text-align: center; }
hr.wave { border: none; border-top: 2px dashed #d8cdb4; margin: 14px 0; }
</style>
</head>
<body>
<div id="app">
  <header id="header"></header>
  <nav id="nav">
    <button data-tab="torikumi" class="active">取組予想</button>
    <button data-tab="basho">場所予想</button>
    <button data-tab="kometori">米取表</button>
  </nav>
  <main>
    <div id="tab-torikumi"></div>
    <div id="tab-basho" style="display:none"></div>
    <div id="tab-kometori" style="display:none"></div>
  </main>
</div>

<div id="oyakata">
  <div id="oyakata-bubble"></div>
  <div id="oyakata-face" onclick="oyakataSay('greet')">👹</div>
</div>

<div id="toast-area"></div>
<div id="modal-area"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ============================================================
// トト相撲 v2.0 — ゲームデータ
// ============================================================
"use strict";

const ICHIMON = ["出羽海", "二所ノ関", "時津風", "伊勢ヶ濱", "高砂"];

// 一門の代表力士（入門の儀の表示用）
const ICHIMON_REPS = {
  "出羽海": ["御嶽海", "宇良"],
  "二所ノ関": ["大の里", "琴櫻"],
  "時津風": ["豊昇龍", "霧島"],

// 仮想番付（令和8年・シミュレーション用 幕内42名）
// rank: Y=横綱 O=大関 S=関脇 K=小結 M1..M17=前頭
const RIKISHI = [
  { id: 1,  name: "豊昇龍",   rank: "Y",   side: "東", ichimon: "時津風" },
  { id: 2,  name: "大の里",   rank: "Y",   side: "西", ichimon: "二所ノ関" },
  { id: 3,  name: "琴櫻",     rank: "O",   side: "東", ichimon: "二所ノ関" },
  { id: 4,  name: "霧島",     rank: "O",   side: "西", ichimon: "時津風" },
  { id: 5,  name: "大栄翔",   rank: "S",   side: "東", ichimon: "出羽海" },
  { id: 6,  name: "若元春",   rank: "S",   side: "西", ichimon: "時津風" },
  { id: 7,  name: "阿炎",     rank: "K",   side: "東", ichimon: "出羽海" },
  { id: 8,  name: "尊富士",   rank: "K",   side: "西", ichimon: "伊勢ヶ濱" },
  { id: 9,  name: "宇良",     rank: "M1",  side: "東", ichimon: "出羽海" },
  { id: 10, name: "高安",     rank: "M1",  side: "西", ichimon: "二所ノ関" },
  { id: 11, name: "伯桜鵬",   rank: "M2",  side: "東", ichimon: "伊勢ヶ濱" },
  { id: 12, name: "翔猿",     rank: "M2",  side: "西", ichimon: "出羽海" },
  { id: 13, name: "御嶽海",   rank: "M3",  side: "東", ichimon: "出羽海" },
  { id: 14, name: "王鵬",     rank: "M3",  side: "西", ichimon: "二所ノ関" },
  { id: 15, name: "熱海富士", rank: "M4",  side: "東", ichimon: "伊勢ヶ濱" },
  { id: 16, name: "豪ノ山",   rank: "M4",  side: "西", ichimon: "二所ノ関" },
  { id: 17, name: "平戸海",   rank: "M5",  side: "東", ichimon: "二所ノ関" },

  { id: 21, name: "隆の勝",   rank: "M7",  side: "東", ichimon: "二所ノ関" },
  { id: 22, name: "遠藤",     rank: "M7",  side: "西", ichimon: "出羽海" },
  { id: 23, name: "金峰山",   rank: "M8",  side: "東", ichimon: "二所ノ関" },
  { id: 24, name: "湘南乃海", rank: "M8",  side: "西", ichimon: "高砂" },
  { id: 25, name: "北勝富士", rank: "M9",  side: "東", ichimon: "出羽海" },
  { id: 26, name: "翠富士",   rank: "M9",  side: "西", ichimon: "伊勢ヶ濱" },
  { id: 27, name: "琴勝峰",   rank: "M10", side: "東", ichimon: "二所ノ関" },

  { id: 40, name: "友風",     rank: "M16", side: "西", ichimon: "二所ノ関" },
  { id: 41, name: "白熊",     rank: "M17", side: "東", ichimon: "二所ノ関" },
  { id: 42, name: "獅司",     rank: "M17", side: "西", ichimon: "時津風" }

// 番付ポイント表（仕様 4.2）
function rankPoint(rank) {
  if (rank === "Y") return 16;
  if (rank === "O") return 14;
  if (rank === "S") return 12;
  if (rank === "K") return 11;
  if (rank[0] === "J") return 0; // 十両
  const m = parseInt(rank.slice(1), 10); // M1=10 … M10=1, M11以下=0
  return Math.max(0, 11 - m);
}
function rankLabel(rank) {
  const map = { Y: "横綱", O: "大関", S: "関脇", K: "小結" };
  if (map[rank]) return map[rank];
  if (rank[0] === "J") return "十両" + (rank.slice(1) === "1" ? "筆頭" : rank.slice(1) + "枚目");
  return "前頭" + (rank.slice(1) === "1" ? "筆頭" : rank.slice(1) + "枚目");
}

// 番付順（横綱→大関→…→前頭→十両、同位は東→西）に並べた力士一覧
function rikishiByBanzuke() {
  const ro = r => {
    const map = { Y: 0, O: 1, S: 2, K: 3 };
    if (map[r.rank] !== undefined) return map[r.rank];
    if (r.rank[0] === "M") return 10 + parseInt(r.rank.slice(1), 10);
    return 100 + (parseInt(r.rank.slice(1), 10) || 0); // 十両
  };
  const west = r => (r.side === "西" || r.side === "W") ? 1 : 0;
  return RIKISHI.slice().sort((a, b) => ro(a) - ro(b) || west(a) - west(b) || a.id - b.id);
}

// シード乱数（全クライアントで同一結果を得るため）
// ============================================================
function hashStr(str) {
  let h = 1779033703 ^ str.length;
  for (let i = 0; i < str.length; i++) {
    h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
    h = (h << 13) | (h >>> 19);
  }
  return (h ^= h >>> 16) >>> 0;
}
function mulberry32(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const rngOf = key => mulberry32(hashStr(SIM_SALT + "::" + key));

// ============================================================
// 場所カレンダー（本場所=奇数月・第2日曜初日・15日間）JST基準
// ============================================================
const JST_OFF = 9 * 3600e3;
function jstNow() {
  const d = new Date(Date.now() + JST_OFF);
  return {
    y: d.getUTCFullYear(), m: d.getUTCMonth() + 1, d: d.getUTCDate(),
    hour: d.getUTCHours(), min: d.getUTCMinutes(), dow: d.getUTCDay(),
    dateMs: Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate()),
    hm: d.getUTCHours() * 60 + d.getUTCMinutes()
  };
}
function secondSunday(y, m) {
  const wd = new Date(Date.UTC(y, m - 1, 1)).getUTCDay();
  return 1 + ((7 - wd) % 7) + 7;
}
function bashoKeyOf(y, m) { return y + "-" + String(m).padStart(2, "0"); }
function bashoNameOf(y, m) { return "令和" + (y - 2018) + "年" + m + "月場所"; }

// 現在の場所と次の場所を返す
function bashoInfo() {
  const t = jstNow();
  const cands = [];
  [t.y - 1, t.y, t.y + 1].forEach(y => [1, 3, 5, 7, 9, 11].forEach(m => {
    const startMs = Date.UTC(y, m - 1, secondSunday(y, m));
    cands.push({ y, m, startMs, key: bashoKeyOf(y, m), name: bashoNameOf(y, m) });
  }));
  cands.sort((a, b) => a.startMs - b.startMs);
  let current = null;
  for (const c of cands) {
    const day = Math.floor((t.dateMs - c.startMs) / 86400e3) + 1;
    if (day >= 1 && day <= 15) { current = Object.assign({ day }, c); break; }
  }
  const next = cands.find(c => c.startMs > t.dateMs);
  return { current, next, now: t };
}

// 締切・発表時刻（ハイブリッド方式）
// ・各取組は推定開始時刻の5分前に個別ロック（幕内進行 15:40〜17:52 を等間隔配分）
// ・結果はデータが届き次第、取組単位で随時反映・精算
// ・翌日の前売りは当日18:00から
const DEADLINE_HM = 15 * 60 + 30;             // 優勝予想の千秋楽締切・懸賞一番確定
const RESULT_HM = 18 * 60;                     // 1日の「終了」目安（シミュレーション時の一括発表もこの時刻）
const NEXT_OPEN_HM = 18 * 60;                  // 翌日分の受付開始
const FIRST_BOUT_HM = 15 * 60 + 40, LAST_BOUT_HM = 17 * 60 + 52, LOCK_MARGIN = 5;

function resultsReady(day) {
  const info = bashoInfo();
  if (!info.current) return true; // 場所外=過去場所は全日確定
  return day < info.current.day || (day === info.current.day && info.now.hm >= RESULT_HM);
}
function estStartHM(i, n) {
  if (n <= 1) return FIRST_BOUT_HM;
  return Math.round(FIRST_BOUT_HM + i * (LAST_BOUT_HM - FIRST_BOUT_HM) / (n - 1));
}
function boutLockHM(slot, n) { return estStartHM(slot, n) - LOCK_MARGIN; }
function fmtHM(hm) { return Math.floor(hm / 60) + ":" + String(hm % 60).padStart(2, "0"); }

// 進行順: 番付合計が低い取組ほど早く、結び（横綱戦）が最後
// 戻り値は「進行順に並んだ取組index」の配列
function boutOrder(day) {
  const dd = SIM && SIM.days[day];
  if (!dd) return [];
  const score = b => rankPoint(rk(b.east).rank) + rankPoint(rk(b.west).rank);
  return dd.torikumi.map((b, i) => i).sort((a, b2) => {
    const d = score(dd.torikumi[a]) - score(dd.torikumi[b2]);
    return d !== 0 ? d : b2 - a; // 同格は掲載の下段（=番付下位）を先に
  });
}
// その取組が進行順で何番目か（0=最初、n-1=結び）
function boutSlot(day, i) { return boutOrder(day).indexOf(i); }

// 取組の受付状態: "open"（受付中）/ "locked"（締切・取組中）/ "done"（結果確定）
function boutState(day, i) {
  const dd = SIM && SIM.days[day];
  if (!dd) return "locked";
  const bout = dd.torikumi[i];
  if (!bout) return "locked";
  if (bout.result) return "done";
  const info = bashoInfo();
  if (!info.current || info.current.key !== SIM.key) return "locked";
  const cur = info.current.day;
  if (day < cur || day > cur + 1) return "locked";
  if (day === cur) return info.now.hm >= boutLockHM(boutSlot(day, i), dd.torikumi.length) ? "locked" : "open";
  return info.now.hm >= NEXT_OPEN_HM ? "open" : "locked"; // 翌日分
}

// 共通シミュレーション（決定論的・全員同一）

// buildSim(key, uptoDay): 1..uptoDay の取組を構築、resultsReady(d)の日は結果も確定
function buildSim(key, uptoDay) {
  const rngB = rngOf(key + "::basho");
  const rikishi = {};
  RIKISHI.forEach(r => {
    rikishi[r.id] = { wins: 0, losses: 0, form: rngB() * 4 - 2, injured: false, kinboshi: 0, opponents: [] };
  });
  // 怪我明け2〜3名（横綱以外）
  const cand = RIKISHI.filter(r => r.rank !== "Y").map(r => r.id);
  const nInj = 2 + Math.floor(rngB() * 2);
  for (let i = 0; i < nInj; i++) {
    const id = cand.splice(Math.floor(rngB() * cand.length), 1)[0];
    rikishi[id].injured = true;
    rikishi[id].form -= 1.5;
  }

  const days = [null]; // days[1..15]
  for (let d = 1; d <= Math.min(uptoDay, 15); d++) {
    const rngD = rngOf(key + "::day" + d);
    const bouts = makeTorikumiDet(rikishi, rngD);
    days[d] = { day: d, torikumi: bouts };
    if (resultsReady(d) || !isCurrentBasho(key)) {
      bouts.forEach(bt => simulateBoutDet(bt, rikishi, rngD));
    }
  }
  return { key, rikishi, days };
}
function isCurrentBasho(key) {
  const info = bashoInfo();
  return info.current && info.current.key === key;
}

function makeTorikumiDet(rikishi, rngD) {
  const standings = RIKISHI.slice().sort((x, y) => {
    const rx = rikishi[x.id], ry = rikishi[y.id];
    if (ry.wins !== rx.wins) return ry.wins - rx.wins;
    const pd = rankPoint(y.rank) - rankPoint(x.rank);
    if (pd) return pd;
    return x.id - y.id;
  });
  const used = new Set(), bouts = [];
  for (const r of standings) {
    if (used.has(r.id)) continue;
    let opp = standings.find(o => o.id !== r.id && !used.has(o.id) && !rikishi[r.id].opponents.includes(o.id));
    if (!opp) opp = standings.find(o => o.id !== r.id && !used.has(o.id));
    if (!opp) break;
    used.add(r.id); used.add(opp.id);
    const [east, west] = rankPoint(r.rank) >= rankPoint(opp.rank) ? [r, opp] : [opp, r];
    bouts.push(makeBoutDet(east, west, rikishi));
  }
  bouts.sort((a, b) => (rankPoint(rk(a.east).rank) + rankPoint(rk(a.west).rank)) - (rankPoint(rk(b.east).rank) + rankPoint(rk(b.west).rank)));
  // 懸賞一番（決定論的）
  let best = -1, bi = 0;
  bouts.forEach((bt, i) => {
    const sc = rankPoint(rk(bt.east).rank) + rankPoint(rk(bt.west).rank) + rngD() * 6;
    if (sc > best) { best = sc; bi = i; }
  });
  bouts[bi].kensho = true;
  return bouts;
}
function rk(id) { return RIKISHI.find(r => r.id === id); }

function makeBoutDet(east, west, rikishi) {
  const pe = rankPoint(east.rank), pw = rankPoint(west.rank);
  const diff = Math.abs(pe - pw);
  let oddsE, oddsW;
  if (pe >= pw) { oddsE = 1.2 + diff * 0.05; oddsW = 1.2 + diff * 0.15; }
  else { oddsE = 1.2 + diff * 0.15; oddsW = 1.2 + diff * 0.05; }
  if (rikishi[east.id].injured) oddsE *= 2;
  if (rikishi[west.id].injured) oddsW *= 2;
  return { east: east.id, west: west.id, oddsE: round2(oddsE), oddsW: round2(oddsW), kensho: false, result: null };
}

function strengthDet(id, rikishi) {
  const r = rk(id), st = rikishi[id];
  return rankPoint(r.rank) + st.form + (st.injured ? -2 : 0);
}
function simulateBoutDet(bout, rikishi, rngD) {
  const se = strengthDet(bout.east, rikishi), sw = strengthDet(bout.west, rikishi);
  const pEast = 1 / (1 + Math.exp(-(se - sw) / 4.5));
  const eastWins = rngD() < pEast;
  const winner = eastWins ? bout.east : bout.west;
  const loser = eastWins ? bout.west : bout.east;
  bout.result = { winner, kimarite: KIMARITE_POOL[Math.floor(rngD() * KIMARITE_POOL.length)] };
  rikishi[winner].wins++; rikishi[loser].losses++;
  rikishi[bout.east].opponents.push(bout.west);
  rikishi[bout.west].opponents.push(bout.east);
  const lr = rk(loser), wr = rk(winner);
  if ((lr.rank === "Y" || lr.rank === "O") && rankPoint(wr.rank) <= 10) rikishi[winner].kinboshi++;
}

// プレイヤー個別最終オッズ（一門+0.2 → 懸賞×1.2）
function finalOdds(bout, side) {
  let o = side === "east" ? bout.oddsE : bout.oddsW;
  const r = rk(side === "east" ? bout.east : bout.west);
  if (r.ichimon === G.profile.ichimon) o += 0.2;
  if (bout.kensho) o *= 1.2;
  return round2(o);
}
function round2(x) { return Math.round(x * 100) / 100; }

// ============================================================
// 保存・読込・新規
// ============================================================
function save() {
  localStorage.setItem("gameState", JSON.stringify(G));
  localStorage.setItem("bets", JSON.stringify(G.bets));
  localStorage.setItem("achievements", JSON.stringify(G.achievements));
  syncCloud();
}
function load() {
  const raw = localStorage.getItem("gameState");
  if (!raw) return false;
  try {
    G = JSON.parse(raw);
    G.stats = Object.assign(DEFAULT_STATS(), G.stats || {});
    G.bets = G.bets || [];
    G.dayAgg = G.dayAgg || {};
    // 旧セーブデータ移行: 推し力士をIDから名前に
    if (!G.profile.oshiName) {
      const r = RIKISHI.find(x => x.id === G.profile.oshiId);
      G.profile.oshiName = r ? r.name : RIKISHI[0].name;
    }
    return true;
  } catch (e) { return false; }
}
function newGame(shikona, ichimon, oshiName) {
  const oshi = RIKISHI.find(r => r.name === oshiName) || RIKISHI[0];
  G = {
    profile: { shikona, ichimon, oshiName: oshi.name, oshiId: oshi.id, title: "t1_01" },
    points: START_POINTS,
    achievements: ["t1_01"],
    stats: DEFAULT_STATS(),
    bashoCount: 1,
    banzukeLevel: 3,
    bashoKey: null,
    bets: [], dayAgg: {},
    yushoBet: null, sanshoBet: null,
    pointsHistory: [], dayLog: [], betDays: [],
    hitsThisBasho: 0, betsThisBasho: 0,
    finishedProcessed: false,
    lastResult: null,
    quizToday: { date: "", count: 0 },
    answeredQuiz: [], quizCatCorrect: {}
  };
  unlockTitle("t1_01");
  save();
}

// ============================================================
// 場所状態の同期（起動時・タブ復帰時に呼ぶ）
// ============================================================
async function ensureBashoState() {
  const info = bashoInfo();
  // 千秋楽を締められるか（実データモードでは15日目の結果が揃うまで待つ）
  const canFinish = () => DATA_MODE !== "real" || !REAL || REAL.bashoKey !== G.bashoKey || realDayResolved(15);
  // 前の場所が終わっていたら締める
  if (G.bashoKey && (!info.current || info.current.key !== G.bashoKey) && !G.finishedProcessed) {
    SIM = simFor(G.bashoKey, 15);
    settlePending();
    if (canFinish()) await processFinish();
    else G.finishedProcessed = true; // データ皆無なら諦めて締める
  }
  if (G.bashoKey && info.current && info.current.key === G.bashoKey && resultsReady(15) && !G.finishedProcessed) {
    SIM = simFor(G.bashoKey, 15);
    settlePending();
    if (canFinish()) await processFinish();
  }
  // 新しい場所が始まっていたら参加
  if (info.current && G.bashoKey !== info.current.key) {
    if (G.bashoKey) { G.bashoCount++; G.stats.bashoPlayed = G.bashoCount; }
    G.bashoKey = info.current.key;
    G.bets = []; G.dayAgg = {}; G.yushoBet = null; G.sanshoBet = null;
    G.pointsHistory = [{ day: 0, points: G.points }];
    G.dayLog = []; G.betDays = [];
    G.hitsThisBasho = 0; G.betsThisBasho = 0;
    G.finishedProcessed = false;
    G.stats.rescuedThisBasho = false;
  }
  // 今場所のシミュレーション構築 + 未精算ベットの精算
  if (info.current && G.bashoKey === info.current.key && !G.finishedProcessed) {
    const upto = Math.min(15, info.current.day + 1);
    SIM = simFor(G.bashoKey, upto);
    settlePending();
    if (resultsReady(15) && !G.finishedProcessed && (DATA_MODE !== "real" || realDayResolved(15))) await processFinish();
  }
  checkAchievements();
  save();
}

// ============================================================
// ベット
// ============================================================
function placeBet(day, boutIdx, side, amount, kimarite, kAmount) {
  if (boutState(day, boutIdx) !== "open") return { ok: false, msg: "この取組は締め切られました" };
  const bout = SIM.days[day].torikumi[boutIdx];
  amount = Math.floor(amount / 100) * 100;
  if (amount < 100) return { ok: false, msg: "100合以上を100合単位で入力してください" };
  kAmount = kimarite ? Math.max(0, Math.floor((kAmount || 0) / 100) * 100) : 0;
  const total = amount + kAmount;
  if (total > G.points) return { ok: false, msg: "持ち米が足りません" };
  const old = G.bets.findIndex(x => x.day === day && x.bout === boutIdx && !x.settled);
  if (old >= 0) {
    G.points += G.bets[old].amount + (G.bets[old].kAmount || 0);
    G.bets.splice(old, 1);
    G.stats.totalBets = Math.max(0, G.stats.totalBets - 1);
    G.betsThisBasho = Math.max(0, G.betsThisBasho - 1);
  }
  const odds = finalOdds(bout, side);
  const allPoints = total === G.points;
  G.points -= total;
  G.bets.push({ day, bout: boutIdx, side, amount, odds, kimarite: kimarite || null, kAmount, settled: false });
  const s = G.stats;
  s.totalBets++;
  s.maxBet = Math.max(s.maxBet, amount);
  if (amount === 100) s.minBets++;
  if (allPoints) s.allPointsBets++;
  const h = jstNow().hour;
  if (h >= 0 && h < 5) s.nightOwl = 1;
  if (!G.betDays.includes(day)) G.betDays.push(day);
  G.betsThisBasho++;
  checkAchievements();
  save();
  return { ok: true };
}
function cancelBet(day, boutIdx) {
  const i = G.bets.findIndex(x => x.day === day && x.bout === boutIdx && !x.settled);
  if (i < 0 || boutState(day, boutIdx) !== "open") return;
  G.points += G.bets[i].amount + (G.bets[i].kAmount || 0);
  G.stats.totalBets = Math.max(0, G.stats.totalBets - 1);
  G.betsThisBasho = Math.max(0, G.betsThisBasho - 1);
  G.bets.splice(i, 1);
  save();
}

// ============================================================
// 精算（結果が確定した日の未精算ベットを処理）
// ============================================================
// 結果が確定した取組から順次精算（ハイブリッド方式: 部分精算に対応）
function settlePending() {
  const s = G.stats;
  const info = bashoInfo();
  G.dayAgg = G.dayAgg || {};
  // その日が「とっくに過ぎた」か（結果が出ないベットの返還判定用）
  const dayLongPast = day => !info.current || info.current.key !== SIM.key || info.current.day > day + 1;
  const batch = []; // {day, detail}

  G.bets.forEach(bet => {
    if (bet.settled) return;
    const dd = SIM.days[bet.day];
    const bout = dd && dd.torikumi[bet.bout];
    // 結果未確定: データ待ちなら保留、日が過ぎていれば返還（不戦・取組消滅など）
    if (!bout || !bout.result) {
      if (dayLongPast(bet.day)) {
        bet.settled = true;
        const refund = bet.amount + (bet.kAmount || 0);
        G.points += refund;
        s.totalBets = Math.max(0, s.totalBets - 1);
        G.betsThisBasho = Math.max(0, G.betsThisBasho - 1);
        if (bout) batch.push({ day: bet.day, detail: { bet, bout, refund, net: 0 } });
      }
      return;
    }
    const pick = bet.side === "east" ? bout.east : bout.west;
    const other = bet.side === "east" ? bout.west : bout.east;
    const pickOdds = bet.side === "east" ? bout.oddsE : bout.oddsW;
    const otherOdds = bet.side === "east" ? bout.oddsW : bout.oddsE;
    const hit = bout.result.winner === pick;
    let gain = 0, oshiBonus = 0;
    bet.settled = true; bet.hit = hit;
    if (hit) {
      gain = Math.round(bet.amount * bet.odds);
      if (pick === G.profile.oshiId) { oshiBonus = Math.round(gain * 0.1); s.oshiHits++; }
      s.totalHits++; s.currentStreak++;
      if (s.currentMissStreak >= 7) s.phoenixHits++;
      s.currentMissStreak = 0;
      s.bestStreak = Math.max(s.bestStreak, s.currentStreak);
      if (bet.odds >= 3) s.upsetHits++;
      if (bet.odds >= 5) s.giantKillHits++;
      if (bout.kensho) s.kenshoHits++;
      if (rk(pick).ichimon === G.profile.ichimon) s.ichimonHits++;
      if (SIM.rikishi[pick].injured) s.injuredHits++;
      if (rk(other).rank === "Y" && rankPoint(rk(pick).rank) <= 11) s.yokozunaKills++;
      G.hitsThisBasho++;
    } else {
      s.totalMisses++; s.currentMissStreak++; s.currentStreak = 0;
      s.totalLost += bet.amount;
    }
    let kGain = 0, kHit = false;
    if (bet.kimarite && bet.kAmount > 0) {
      const actual = bout.result.kimarite;
      const isOther = !["押し出し", "寄り切り", "はたき込み"].includes(actual);
      kHit = (bet.kimarite === actual) || (bet.kimarite === "それ以外" && isOther);
      if (kHit) {
        kGain = Math.round(bet.kAmount * KIMARITE_BET.find(k => k.key === bet.kimarite).odds);
        s.kimariteHits++; s.kimariteStreak++;
        s.kimariteStreakBest = Math.max(s.kimariteStreakBest, s.kimariteStreak);
        if (bet.kimarite === "それ以外") s.rareKimariteHits++;
        if (hit) s.doubleHits++;
      } else s.kimariteStreak = 0;
    }
    const totalGain = gain + oshiBonus + kGain;
    if (totalGain > 0) { G.points += totalGain; s.totalEarned += totalGain; }
    s.maxSingleWin = Math.max(s.maxSingleWin, gain + oshiBonus);
    const net = totalGain - (hit ? 0 : bet.amount) - (kHit ? 0 : (bet.kAmount || 0));
    // 日次集計（日の締めまで蓄積）
    const agg = G.dayAgg[bet.day] = G.dayAgg[bet.day] || { bets: 0, hits: 0, net: 0, fav: 0, dog: 0 };
    agg.bets++; if (hit) agg.hits++; agg.net += net;
    if (pickOdds > otherOdds) agg.dog++; else agg.fav++;
    batch.push({ day: bet.day, detail: { bet, bout, hit, gain, oshiBonus, kGain, kHit, net } });
  });

  s.maxPoints = Math.max(s.maxPoints, G.points);
  if (G.points <= 500 && G.points > 0) s.lowWaterMark = true;
  if (s.lowWaterMark && G.points >= 10000) { s.comebacks++; s.lowWaterMark = false; }
  // 破産チェック（仕様9: 即時救済 → 演出は起動時に表示）
  if (batch.length && G.points <= 0) {
    s.bankruptcies++;
    G.points += 5000;
    s.rescuedThisBasho = true;
    pendingModals.push({ type: "rescue" });
  }

  // 日の締め: 全取組確定 & その日の未精算ベットなし → 日次記録を確定
  Object.keys(G.dayAgg).map(Number).forEach(day => {
    const dd = SIM.days[day];
    const complete = (dd && dd.torikumi.length && dd.torikumi.every(bt => bt.result)) || dayLongPast(day);
    const pending = G.bets.some(b => !b.settled && b.day === day);
    if (!complete || pending || G.dayLog.some(l => l.day === day)) return;
    const agg = G.dayAgg[day];
    if (agg.bets > 0) {
      s.daysPlayed++;
      if (agg.hits === agg.bets && agg.bets >= 5) {
        if (day === 1) s.day1Perfect++;
        if (day === 8) s.day8Perfect++;
        if (day === 15) s.day15Perfect++;
        if (agg.bets >= 10) s.bigPerfectDays++;
      }
      if (agg.hits === 0 && agg.bets >= 5) s.zeroDays++;
      if (agg.fav === agg.bets && agg.bets >= 5) s.favoriteDays++;
      if (agg.dog === agg.bets && agg.bets >= 5) s.contrarianDays++;
      if (dd && agg.bets >= dd.torikumi.length) s.allInDays++;
    }
    G.dayLog.push({ day, bets: agg.bets, hits: agg.hits, net: agg.net });
    if (!G.pointsHistory.some(h => h.day === day)) G.pointsHistory.push({ day, points: G.points });
    delete G.dayAgg[day];
  });

  // モーダル用サマリ（今回精算した分を日ごとにまとめる）
  const summaries = [];
  [...new Set(batch.map(x => x.day))].sort((a, b) => a - b).forEach(day => {
    const details = batch.filter(x => x.day === day).map(x => x.detail);
    const dayHits = details.filter(d => d.hit).length;
    const dayMiss = details.filter(d => d.hit === false).length;
    const net = details.reduce((a, d) => a + (d.net || 0), 0);
    summaries.push({ day, details, dayHits, dayMiss, net, betCount: details.filter(d => d.refund === undefined).length });
  });
  if (summaries.length) pendingModals.unshift({ type: "settle", data: summaries });
  G.bets = G.bets.filter(x => !x.settled);
  checkAchievements();
  save();
  return summaries;
}

// ============================================================
// 場所締め（優勝・三賞・番付・換算）
// ============================================================
async function processFinish() {
  if (G.finishedProcessed) return;
  const s = G.stats;
  const rikishi = SIM.rikishi;
  const rngF = rngOf(G.bashoKey + "::final");
  const [y, m] = G.bashoKey.split("-").map(Number);

  let maxW = -1;
  RIKISHI.forEach(r => { maxW = Math.max(maxW, rikishi[r.id].wins); });
  const contenders = RIKISHI.filter(r => rikishi[r.id].wins === maxW);
  const champion = contenders[Math.floor(rngF() * contenders.length)];
  const playoff = contenders.length > 1;

  const isM = r => r.rank.startsWith("M");
  const nonSanyaku = RIKISHI.filter(r => !["Y", "O"].includes(r.rank));
  const shukunCand = nonSanyaku.filter(r => rikishi[r.id].kinboshi >= 1 && rikishi[r.id].wins >= 8);
  const shukun = shukunCand.length ? shukunCand.sort((a, c) => rikishi[c.id].kinboshi - rikishi[a.id].kinboshi || a.id - c.id)[0].name : "該当者なし";
  const kantoCand = RIKISHI.filter(r => isM(r) && rikishi[r.id].wins >= 10);
  const kanto = kantoCand.length ? kantoCand.sort((a, c) => rikishi[c.id].wins - rikishi[a.id].wins || a.id - c.id)[0].name : "該当者なし";
  const ginoCand = nonSanyaku.filter(r => rikishi[r.id].wins >= 10 && r.name !== kanto);
  const gino = (ginoCand.length && rngF() > 0.3) ? ginoCand[Math.floor(rngF() * ginoCand.length)].name : "該当者なし";

  let yushoResult = null;
  if (G.yushoBet) {
    const hit = G.yushoBet.rikishiId === champion.id;
    let bonus = 0;
    if (hit) {
      const last = G.dayLog.find(d => d.day === 15);
      bonus = last ? Math.max(0, last.net) : 0;
      G.points += bonus; s.totalEarned += bonus; s.yushoHits++;
    }
    yushoResult = { hit, pick: rk(G.yushoBet.rikishiId).name, bonus };
  }
  let sanshoResult = null;
  if (G.sanshoBet) {
    const sb = G.sanshoBet;
    const mult = SANSHO_ODDS[sb.day] || 1.2;
    const r1 = sb.shukun === shukun, r2 = sb.kanto === kanto, r3 = sb.gino === gino;
    let gain = 0;
    [r1, r2, r3].forEach(hit => { if (hit) gain += Math.round(sb.amount * mult); });
    if (r1) s.shukunHits++;
    if (r2) s.kantoHits++;
    if (r3) s.ginoHits++;
    if (r1 && r2 && r3) s.sanshoSweeps++;
    if (gain > 0) { G.points += gain; s.totalEarned += gain; }
    sanshoResult = { r1, r2, r3, gain, mult };
  }

  if (G.betsThisBasho >= 20 && G.hitsThisBasho / G.betsThisBasho > 0.5) {
    s.kachikoshiBasho++;
    if (s.rescuedThisBasho) s.redemptions++;
  }
  if (G.hitsThisBasho >= 10) s.tenWinBasho++;
  if (G.hitsThisBasho >= 30) s.thirtyWinBasho++;
  if (G.betDays.length >= 15) s.fullBasho++;
  s.bashoFinished++;
  s.maxPoints = Math.max(s.maxPoints, G.points);

  // 番付（オンライン: 全プレイヤーで算定）
  const leaders = await fetchLeaderboard(G.bashoKey);
  const banzuke = computeBanzuke(leaders);
  s.bestBanzuke = Math.max(s.bestBanzuke, banzuke.level);
  if (banzuke.level === 9) s.totoTsunaCount++;
  G.banzukeLevel = banzuke.level;

  // 価値換算 + 一門祝勝会（一門平均的中率1位で×1.1）
  const kg = round2(G.points * 0.15);
  const tawara = round2(kg / 60);
  const yen = Math.round(kg * 600);
  let topIchimon = null, ichimonWin = false;
  if (leaders && leaders.length) {
    const agg = {};
    leaders.forEach(p => {
      if (!p.ichimon || !p.bets) return;
      (agg[p.ichimon] = agg[p.ichimon] || []).push(p.hits / p.bets);
    });
    const ranked = Object.entries(agg).map(([im, arr]) => [im, arr.reduce((a, b2) => a + b2, 0) / arr.length]).sort((a, b2) => b2[1] - a[1]);
    if (ranked.length) { topIchimon = ranked[0][0]; ichimonWin = topIchimon === G.profile.ichimon; }
  }
  if (!topIchimon) { topIchimon = ICHIMON[Math.floor(rngF() * 5)]; ichimonWin = topIchimon === G.profile.ichimon; }

  G.lastResult = {
    bashoName: bashoNameOf(y, m),
    champion: champion.name, playoff, championWins: maxW,
    shukun, kanto, gino, yushoResult, sanshoResult,
    finalPoints: G.points, hits: G.hitsThisBasho, bets: G.betsThisBasho,
    banzuke: { level: banzuke.level, levelName: banzuke.levelName, pos: banzuke.pos, total: banzuke.total },
    kg, tawara, yen, ichimonWin, topIchimon
  };
  G.finishedProcessed = true;
  pendingModals.push({ type: "bashoResult" });
  checkAchievements();
  save();
}

// ============================================================
// 場所予想
// ============================================================
function placeYushoBet(rikishiId) {
  const info = bashoInfo();
  if (!info.current || G.finishedProcessed) return { ok: false, msg: "受付期間外です" };
  if (info.current.day === 15 && info.now.hm >= DEADLINE_HM) return { ok: false, msg: "千秋楽の取組が始まりました（受付終了）" };
  if (G.yushoBet) return { ok: false, msg: "確定済みです" };
  G.yushoBet = { rikishiId };
  save();
  return { ok: true };
}
function doneDaysNow() {
  const info = bashoInfo();
  if (!info.current) return 15;
  return info.current.day - (info.now.hm >= RESULT_HM ? 0 : 1);
}
function placeSanshoBet(shukun, kanto, gino, amount) {
  const dd = doneDaysNow();
  if (dd < 8) return { ok: false, msg: "三賞予想は8日目終了後(18時以降)に解放されます" };
  if (dd > 14) return { ok: false, msg: "受付は14日目終了までです" };
  if (G.sanshoBet) return { ok: false, msg: "確定済みです（変更不可）" };
  amount = Math.floor(amount / 100) * 100;
  if (amount < 100 || amount * 3 > G.points) return { ok: false, msg: "予想料が不足しています（1賞につき同額）" };
  G.points -= amount * 3;
  G.sanshoBet = { shukun, kanto, gino, amount, day: dd };
  save();
  return { ok: true };
}

// ============================================================
// Supabase 連携
// ============================================================
function sbConfigured() { return !!(CONFIG.url && CONFIG.anonKey && typeof window !== "undefined" && window.supabase); }
async function sbInit() {
  if (!sbConfigured()) return false;
  try {
    SB = window.supabase.createClient(CONFIG.url, CONFIG.anonKey);
    let { data: { session } } = await SB.auth.getSession();
    if (!session) {
      const { data, error } = await SB.auth.signInAnonymously();
      if (error) { console.warn("匿名ログイン失敗:", error.message); SB = null; return false; }
      session = data.session;
    }
    MYID = session.user.id;
    await pushProfile();
    return true;
  } catch (e) { console.warn("Supabase接続失敗:", e); SB = null; return false; }
}
async function pushProfile() {
  if (!SB || !MYID || !G) return;
  const { error } = await SB.from("players").upsert({
    id: MYID,
    shikona: G.profile.shikona,
    ichimon: G.profile.ichimon,
    title: currentTitleName(),
    basho_key: G.bashoKey,
    points: G.points,
    hits: G.hitsThisBasho,
    bets: G.betsThisBasho,
    banzuke_level: G.banzukeLevel,
    basho_count: G.bashoCount,
    updated_at: new Date().toISOString()
  });
  if (error) console.warn("同期失敗:", error.message);
}
let pushTimer = null;
function syncCloud() {
  if (!SB) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(pushProfile, 1500);
}
async function fetchLeaderboard(bashoKey) {
  if (!SB) return null;
  const { data, error } = await SB.from("players")
    .select("id, shikona, ichimon, title, points, hits, bets, basho_count")
    .eq("basho_key", bashoKey)
    .order("points", { ascending: false })
    .limit(200);
  if (error) { console.warn("ランキング取得失敗:", error.message); return null; }
  LEADER = data;
  return data;
}

// 番付算定（仕様6）: list=players行 or null（ローカルのみ）
function computeBanzuke(list) {
  const rows = [];
  if (list && list.length) {
    list.forEach(p => rows.push({
      id: p.id, name: p.shikona, title: p.title, ichimon: p.ichimon,
      points: p.points, rate: p.bets ? p.hits / p.bets : 0,
      isNew: (p.basho_count || 1) === 1, me: p.id === MYID
    }));
    if (MYID && !rows.some(r => r.me) && G.betsThisBasho > 0) {
      rows.push({ id: MYID, name: G.profile.shikona, title: currentTitleName(), ichimon: G.profile.ichimon, points: G.points, rate: G.betsThisBasho ? G.hitsThisBasho / G.betsThisBasho : 0, isNew: G.bashoCount === 1, me: true });
    }
  } else {
    rows.push({ id: "me", name: G.profile.shikona, title: currentTitleName(), ichimon: G.profile.ichimon, points: G.points, rate: G.betsThisBasho ? G.hitsThisBasho / G.betsThisBasho : 0, isNew: G.bashoCount === 1, me: true });
  }
  rows.sort((x, y2) => y2.points - x.points || y2.rate - x.rate);
  const N = rows.length;
  rows.forEach((u, i) => {
    u.pos = i + 1;
    if (u.points < 33000) u.level = u.isNew ? 3 : 4;
    else if (i < 4) u.level = 9;
    else if (u.pos <= Math.ceil(N * 0.05)) u.level = 8;
    else if (u.pos <= Math.ceil(N * 0.10)) u.level = 7;
    else if (u.pos <= Math.ceil(N * 0.20)) u.level = 6;
    else u.level = 5;
    u.levelName = BANZUKE_NAMES[u.level];
  });
  const me = rows.find(u => u.me);
  return { level: me ? me.level : (G.bashoCount === 1 ? 3 : 4), levelName: me ? me.levelName : BANZUKE_NAMES[G.bashoCount === 1 ? 3 : 4], pos: me ? me.pos : null, total: N, table: rows };
}

function todayStr() { const t = jstNow(); return t.y + "-" + String(t.m).padStart(2, "0") + "-" + String(t.d).padStart(2, "0"); }
function canChanko() { return localStorage.getItem("dailyBonus") !== todayStr(); }
function takeChanko() {
  if (!canChanko()) return false;
  localStorage.setItem("dailyBonus", todayStr());
  G.points += 1000;
  G.stats.chankoCount++;
  G.stats.totalEarned += 1000;
  G.stats.maxPoints = Math.max(G.stats.maxPoints, G.points);
  checkAchievements();
  save();
  return true;
}
function getQuiz() {
  if (G.quizToday.date !== todayStr()) G.quizToday = { date: todayStr(), count: 0 };
  if (G.quizToday.count >= 1) return null; // 1日1問まで
  const unanswered = QUIZ.map((q, i) => i).filter(i => !G.answeredQuiz.includes(i));
  const pool = unanswered.length ? unanswered : QUIZ.map((q, i) => i);
  const idx = pool[Math.floor(Math.random() * pool.length)];
  return { idx, quiz: QUIZ[idx] };
}
function answerQuiz(idx, choice) {
  const q = QUIZ[idx];
  const correct = choice === q.a;
  const s = G.stats;
  s.quizTotal++;
  G.quizToday.count++;
  let reward = 0;
  if (correct) {
    reward = 500 + Math.floor(Math.random() * 6) * 100;
    G.points += reward;
    s.totalEarned += reward;
    s.quizCorrect++; s.quizStreak++;
    s.quizStreakBest = Math.max(s.quizStreakBest, s.quizStreak);
    if (!G.answeredQuiz.includes(idx)) {
      G.answeredQuiz.push(idx);
      s.quizUniqueCorrect = G.answeredQuiz.length;
      G.quizCatCorrect[q.cat] = (G.quizCatCorrect[q.cat] || 0) + 1;
      if (G.quizCatCorrect[q.cat] >= 5 && !s.quizCatDone.includes(q.cat)) s.quizCatDone.push(q.cat);
    }
    s.maxPoints = Math.max(s.maxPoints, G.points);
  } else s.quizStreak = 0;
  localStorage.setItem("quizHistory", JSON.stringify(G.answeredQuiz));
  checkAchievements();
  save();
  return { correct, reward, answer: q.c[q.a] };
}
function unlockTitle(id) {
  if (!G.achievements.includes(id)) {
    G.achievements.push(id);
    const t = TITLES.find(x => x.id === id);
    if (t) toastQueue.push({ type: "title", name: t.name, desc: t.desc });
  }
}
function checkAchievements() {
  TITLES.forEach(t => {
    if (G.achievements.includes(t.id)) return;
    try { if (t.cond(G.stats, G)) unlockTitle(t.id); } catch (e) { }
  });
}

  const t = TITLES.find(x => x.id === G.profile.title);
  return t ? t.name : "";
}

function ridOf(name) { return 100000 + (hashStr("rid::" + name) % 800000); }

async function loadRealData() {
  try {
    const res = await fetch(DATA_URL + "?t=" + Date.now(), { cache: "no-store" });
    if (!res.ok) return;
    const j = await res.json();
    if (!j || !j.bashoKey || !j.banzuke || j.banzuke.length < 20 || !j.days) return;
    const info = bashoInfo();
    const relevant = (info.current && j.bashoKey === info.current.key) || (G && G.bashoKey === j.bashoKey);
    if (!relevant && info.current) return; // 古いデータは使わない
    REAL = j;
    DATA_MODE = "real";
  } catch (e) { console.warn("実データ読込失敗（シミュレーションで継続）:", e); }
}

// RIKISHI配列を実番付で置き換える
function applyRealBanzuke() {
  if (!REAL) return;
  const rows = REAL.banzuke.filter(b => /^([YOSK]|M\d+|J\d+)$/.test(b.rank));
  if (rows.length < 20) return;
  RIKISHI.length = 0;
  rows.forEach(b => RIKISHI.push({
    id: ridOf(b.name), name: b.name, rank: b.rank, side: b.side || "",
    ichimon: ICHIMON_MAP[b.name] || ICHIMON[hashStr("im::" + b.name) % 5]
  }));
  // 推し力士を名前で復元
  if (G) {
    const r = RIKISHI.find(x => x.name === G.profile.oshiName);
    G.profile.oshiId = r ? r.id : null;
  }
}

// 実データから SIM を構築（buildSim と同じ形を返す）
function buildSimFromReal(uptoDay) {
  const key = REAL.bashoKey;
  const rikishi = {};
  // 怪我明けB条件: 前場所5日以上休場 → 場所を通して×2
  const carry = REAL.injuredCarry || [];
  RIKISHI.forEach(r => {
    rikishi[r.id] = { wins: 0, losses: 0, form: 0, injured: carry.includes(r.name), kinboshi: 0, opponents: [] };
  });
  const kyujoLog = REAL.kyujoLog || {};
  const days = [null];
  for (let d = 1; d <= Math.min(uptoDay, 15); d++) {
    const src = REAL.days[String(d)] || REAL.days[d];
    if (!src) { days[d] = null; continue; }
    // 怪我明けC条件: 今場所休場記録のある力士が再出場 → その日から×2
    RIKISHI.forEach(r => {
      if (rikishi[r.id].injured) return;
      const wasOut = Object.entries(kyujoLog).some(([kd, names]) => Number(kd) < d && names.includes(r.name));
      if (wasOut && src.some(x => x.e === r.name || x.w === r.name)) rikishi[r.id].injured = true;
    });
    const rngD = rngOf(key + "::day" + d);
    const bouts = [];
    src.forEach(x => {
      const e = RIKISHI.find(r => r.name === x.e), w = RIKISHI.find(r => r.name === x.w);
      if (!e || !w) return;
      const bout = makeBoutDet(e, w, rikishi);
      if (x.win) {
        const winner = x.win === "e" ? e.id : w.id;
        const loser = x.win === "e" ? w.id : e.id;
        bout.result = { winner, kimarite: x.k || "不明" };
        rikishi[winner].wins++; rikishi[loser].losses++;
        rikishi[e.id].opponents.push(w.id); rikishi[w.id].opponents.push(e.id);
        const lr = rk(loser), wr = rk(winner);
        if ((lr.rank === "Y" || lr.rank === "O") && wr.rank[0] === "M") rikishi[winner].kinboshi++;
      }
      bouts.push(bout);
    });
    // 懸賞一番（シードで決定・全員共通）
    if (bouts.length) {
      let best = -1, bi = 0;
      bouts.forEach((bt, i) => {
        const sc = rankPoint(rk(bt.east).rank) + rankPoint(rk(bt.west).rank) + rngD() * 6;
        if (sc > best) { best = sc; bi = i; }
      });
      bouts[bi].kensho = true;
    }
    days[d] = bouts.length ? { day: d, torikumi: bouts } : null;
  }
  return { key, rikishi, days };
}

// 指定日の実結果が出揃っているか
function realDayResolved(day) {
  if (!REAL) return false;
  const src = REAL.days[String(day)] || REAL.days[day];
  if (!src || !src.length) return false;
  const resolved = src.filter(x => x.win).length;
  return resolved >= Math.max(1, src.length - 2); // 不戦・保留を許容
}

// key に対する SIM を構築（実データ優先）
function simFor(key, uptoDay) {
  if (DATA_MODE === "real" && REAL && REAL.bashoKey === key) return buildSimFromReal(uptoDay);
  return buildSim(key, uptoDay);
}

    <div class="bet-panel">
      <div class="bet-row"><b>${esc(r.name)}</b>（${odds.toFixed(2)}倍）に賭ける</div>
      <div class="bet-row"><label>賭け米</label><input type="number" id="bet-amount" value="500" step="100" min="100" max="${G.points}"> 合</div>
      <div class="bet-row"><label>決まり手</label>
        <select id="bet-kimarite"><option value="">予想しない</option>
          ${KIMARITE_BET.map(k => `<option value="${k.key}">${k.key}（${k.odds}倍）</option>`).join("")}
        </select>
        <input type="number" id="bet-kamount" value="0" step="100" min="0" placeholder="決まり手賭け米"> 合
      </div>
      <div class="bet-row">

        <button class="btn btn-ghost" onclick="UI.openBet=null;renderTorikumi()">やめる</button>
      </div>
    </div>`;
  }
  return html + `</div>`;
}

function openBetPanel(i, side, day) {
  if (boutState(day, i) !== "open") { showToast("🔒 締切", "この取組の受付は終了しています"); return; }
  UI.openBet = { bout: i, side, day };

  if (r.ichimon === G.profile.ichimon) oyakataSay("ichimon");
  else if (r.id === G.profile.oshiId) oyakataSay("oshi");
}
function onConfirmBet(day, i, side) {

}

// ---------------- 収支グラフ ----------------
function drawChart() {
  const cv = $("#chart");
  if (!cv) return;
  const ctx = cv.getContext("2d");
  const W = cv.width, H = cv.height, P = 40;
  ctx.clearRect(0, 0, W, H);
  const hist = (G.pointsHistory && G.pointsHistory.length) ? G.pointsHistory : [{ day: 0, points: G.points }];
  const xs = d => P + (W - P * 2) * (d / 15);
  const vals = hist.map(h => h.points);
  const maxV = Math.max(33000, ...vals) * 1.05, minV = 0;
  const ys = v => H - P + (P * 2 - H) * ((v - minV) / (maxV - minV));
  ctx.strokeStyle = "#ddd2b8"; ctx.fillStyle = "#8a7a60"; ctx.font = "11px serif"; ctx.lineWidth = 1;
  for (let v = 0; v <= maxV; v += 10000) {
    ctx.beginPath(); ctx.moveTo(P, ys(v)); ctx.lineTo(W - P, ys(v)); ctx.stroke();
    ctx.fillText((v / 1000) + "k", 6, ys(v) + 4);
  }
  ctx.strokeStyle = "#c9a227"; ctx.setLineDash([5, 4]);
  ctx.beginPath(); ctx.moveTo(P, ys(33000)); ctx.lineTo(W - P, ys(33000)); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = "#a8861a"; ctx.fillText("関取 33,000", W - P - 70, ys(33000) - 5);
  ctx.fillStyle = "#8a7a60";
  for (let d = 0; d <= 15; d += 3) ctx.fillText(d === 0 ? "前" : d + "日", xs(d) - 8, H - P + 16);
  ctx.strokeStyle = "#5c1a1a"; ctx.lineWidth = 2.5;
  ctx.beginPath();
  hist.forEach((h, i) => { const x = xs(h.day), y = ys(h.points); i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); });
  ctx.stroke();
  hist.forEach(h => {
    ctx.fillStyle = "#c9a227";
    ctx.beginPath(); ctx.arc(xs(h.day), ys(h.points), 4, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = "#5c1a1a"; ctx.lineWidth = 1.5; ctx.stroke();
  });
}

// ---------------- クイズ ----------------
function openQuiz() {
  const q = getQuiz();
  if (!q) { showToast("📖 相撲クイズ", "本日の一問は回答済み。また明日！"); return; }
  oyakataSay("quiz");
  openModal(`
    <h2>📖 本日の相撲クイズ <span class="muted" style="font-size:11px">［${esc(q.quiz.cat)}］1日1問</span></h2>
    <p style="font-size:15px;line-height:1.8;margin-bottom:12px">${esc(q.quiz.q)}</p>
    ${q.quiz.c.map((c, i) => `<button class="quiz-choice" id="qc-${i}" onclick="onQuizAnswer(${q.idx},${i})">${"アイウエ"[i]}．${esc(c)}</button>`).join("")}
    <button class="btn btn-ghost btn-wide" id="quiz-quit" onclick="closeModal()">やめておく</button>
  `);
}
function onQuizAnswer(idx, choice) {
  const res = answerQuiz(idx, choice);
  document.querySelectorAll(".quiz-choice").forEach((b, i) => {
    b.disabled = true;
    if (i === QUIZ[idx].a) b.classList.add("correct");
    else if (i === choice) b.classList.add("wrong");
  });
  const quit = $("#quiz-quit");
  if (quit) quit.remove();
  const div = document.createElement("div");
  div.className = "day-summary";
  div.innerHTML = res.correct
    ? `<span class="net-plus">正解！ +${fmt(res.reward)}合</span>`
    : `<span class="net-minus">残念！</span><br><span class="muted">正解：${esc(res.answer)}</span>`;
  $(".modal").appendChild(div);
  renderHeader();
  // 結果を見せてから自動で閉じる
  setTimeout(() => { closeModal(); renderAll(); }, 2800);
}

// ---------------- 親方・トースト・モーダル ----------------
let oyakataTimer = null;
function oyakataSay(type) {
  const msg = pickRand(OYAKATA[type] || OYAKATA.greet);
  const bub = $("#oyakata-bubble");
  bub.textContent = msg;
  bub.style.display = "block";
  clearTimeout(oyakataTimer);
  oyakataTimer = setTimeout(() => { bub.style.display = "none"; }, 5000);
}
function showToast(title, body) {
  const area = $("#toast-area");
  const t = document.createElement("div");
  t.className = "toast";
  t.innerHTML = `<b>${title}</b><small>${body}</small>`;
  area.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}
function drainToasts() {
  while (toastQueue.length) {
    const t = toastQueue.shift();
    showToast(`🏅 称号獲得「${esc(t.name)}」`, esc(t.desc));
  }
}
function openModal(html) { $("#modal-area").innerHTML = `<div class="modal-bg"><div class="modal">${html}</div></div>`; }
function closeModal() { $("#modal-area").innerHTML = ""; }

// ---------------- オンボーディング（入門の儀） ----------------
function renderOnboarding() {
  const oshiOpts = rikishiByBanzuke().map(r => `<option value="${esc(r.name)}">${esc(r.name)}（${rankLabel(r.rank)}）</option>`).join("");
  openModal(`
    <div class="onb-logo">トト相撲</div>
    <div class="onb-sub">— 大相撲 取組予想ゲーム ONLINE・入門の儀 —</div>
    <div class="form-row"><label>四股名</label><input id="onb-name" maxlength="10" placeholder="例：朝青空"></div>
    <p style="font-size:13px;font-weight:bold;margin:10px 0 6px">所属一門を選ぶ</p>
    <div class="ichimon-grid" id="onb-ichimon">
      ${ICHIMON.map(x => `<button class="ichimon-card" data-im="${x}" onclick="onbIchimon('${x}')">${x}一門<br>
        <span style="font-size:11px;font-weight:normal;opacity:.75">${(ICHIMON_REPS[x] || []).join("・")}</span></button>`).join("")}
    </div>
    <p style="font-size:13px;font-weight:bold;margin:10px 0 6px">推し力士を選ぶ</p>
    <div class="form-row"><select id="onb-oshi">${oshiOpts}</select></div>
    <p class="muted center" style="margin:8px 0">持ち米 15,000合 からのスタート！<br>全プレイヤー共通の取組・各取組の直前まで受付</p>
    <button class="btn btn-gold btn-wide" onclick="onbStart()">🥁 入門する</button>
  `);
}
function onbIchimon(x) {
  UI.onb.ichimon = x;
  document.querySelectorAll(".ichimon-card").forEach(b => b.classList.toggle("sel", b.dataset.im === x));
}
async function onbStart() {
  const name = $("#onb-name").value.trim().slice(0, 10);
  if (!name) { alert("四股名を入力してください"); return; }
  if (!UI.onb.ichimon) { alert("所属一門を選んでください"); return; }
  newGame(name, UI.onb.ichimon, $("#onb-oshi").value);
  closeModal();
  await sbInit();
  await ensureBashoState();
  renderAll();
  showToast("🥁 入門の儀 完了", `${UI.onb.ichimon}一門・${name} 関の誕生だ！`);
  playPendingModals();
  setTimeout(() => oyakataSay("greet"), 600);
}

init();
</script>
