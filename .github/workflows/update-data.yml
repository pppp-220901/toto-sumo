# トト相撲 — 取組データ自動更新（.github/workflows/update-data.yml に配置）
name: update sumo data

on:
  schedule:
    # 取組時間帯（JST 15:00〜18:50）は10分間隔でライブ更新
    - cron: "*/10 6-9 * * *"
    # JST 19:15（最終確定） / 翌朝8:15（翌日取組の取りこぼし回収）
    - cron: "15 10 * * *"
    - cron: "15 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: fetch data
        run: node scraper/fetch_basho.mjs

      - name: commit if changed
        run: |
          git config user.name "toto-sumo-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/basho.json || true
          if git diff --cached --quiet; then
            echo "変更なし"
          else
            git commit -m "data: $(date +'%Y-%m-%d %H:%M') update"
            git push
          fi
