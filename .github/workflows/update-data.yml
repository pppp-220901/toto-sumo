name: update sumo data

# 本場所データの自動取得。個人利用の範囲で「1日3回」に限定する。
# （取組時間中の10分間隔ライブ更新は廃止。取組の結果は次回の定時取得でまとめて反映される）
#
# GitHub Actions の cron は UTC 表記。JST(=UTC+9) との対応は下記のとおり。
#   JST 18:15 → UTC 09:15   （その日の全取組が終わった後）
#   JST 19:15 → UTC 10:15   （取りこぼしの追い取得）
#   JST 08:15 → UTC 23:15   （前日）  （翌朝・翌日の取組カード発表の取り込み）

on:
  schedule:
    - cron: "15 9 * * *"    # JST 18:15
    - cron: "15 10 * * *"   # JST 19:15
    - cron: "15 23 * * *"   # JST 翌 08:15
  workflow_dispatch: {}      # 「Actions」タブから手動実行も可能

# 直近の実行が走っている間は重複起動しない
concurrency:
  group: update-sumo-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch basho data
        run: node scraper/fetch_basho.mjs

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/basho.json)" ]; then
            git add data/basho.json
            git commit -m "update sumo data ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          else
            echo "変更なし。コミットをスキップします。"
          fi
