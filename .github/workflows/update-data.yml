name: update sumo news

# 【手動運用】取組・番付・優勝三賞は「取組結果登録ツール」で手動登録する。
# このワークフローが自動で更新するのは大相撲ニュース見出しだけ（GoogleニュースRSS）。
# 手動登録との衝突を避けるため、取組結果を手で入れる夜の時間帯を外し、
# 1日1回・朝（JST 07:15）だけ実行する。news 以外のフィールドには触れない。
#
# GitHub Actions の cron は UTC 表記。JST 07:15 = UTC 22:15（前日）。

on:
  schedule:
    - cron: "15 22 * * *"   # JST 翌 07:15
  workflow_dispatch: {}      # 「Actions」タブから手動実行も可能

concurrency:
  group: update-sumo-news
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch news
        run: node scraper/fetch_basho.mjs

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 手動更新と競合してpushが弾かれたら、最新を取り込んでニュースだけ再適用
          git add data/basho.json
          if git diff --cached --quiet; then
            echo "変更なし。コミットをスキップします。"
            exit 0
          fi
          git commit -m "update sumo news ($(date -u +%Y-%m-%dT%H:%MZ))"
          for i in 1 2 3; do
            if git push; then break; fi
            echo "push失敗。最新を取り込んで再試行 ($i)"
            git pull --rebase --autostash || true
          done
